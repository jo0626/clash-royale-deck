// ビルダーと同じスロット判定（0=進化, 1=ヒーロー, 2=ワイルド, 3-7=通常）
function slotModeOf(info, idx) {
  if (!info) return 'normal';
  if (idx === 0) return info.e ? 'evolved' : 'normal';
  if (idx === 1) return info.h ? 'hero' : 'normal';
  if (idx === 2) { if (info.e) return 'evolved'; if (info.h) return 'hero'; return 'normal'; }
  return 'normal';
}

function renderDecks(decks) {
  const wrap = document.getElementById('deckList');
  wrap.innerHTML = '';
  decks.forEach((d, idx) => {
    const avg = (d.slots.reduce((s,n)=> s + (CARD_INFO[n]?CARD_INFO[n].c:0), 0) / d.slots.length).toFixed(1);
    const mini = d.slots.map((n, i) => {
      const info = CARD_INFO[n] || {};
      const mode = slotModeOf(info, i);
      const img = mode==='evolved' ? (info.iv||info.i) : mode==='hero' ? (info.ih||info.i) : info.i;
      const badge = mode==='evolved' ? '<span class="slot-badge">⚡</span>' : mode==='hero' ? '<span class="slot-badge">👑</span>' : '';
      const cls = 'mini-card' + (mode==='evolved'?' is-evo':'') + (mode==='hero'?' is-hero':'');
      return '<div class="'+cls+'" title="'+n+'"><span class="pip">'+(info.c!=null?info.c:'')+'</span>'+badge+(img?'<img src="'+img+'" alt="'+n+'" loading="lazy">':'')+'</div>';
    }).join('');
    const url = 'index.html?deck=' + encodeURIComponent(d.slots.join(','));
    const el = document.createElement('div');
    el.className = 'deck-card';
    el.innerHTML =
      '<div class="deck-card-head"><span class="deck-rank">#'+(idx+1)+'</span>'+
      '<div><div class="deck-card-name">'+d.name+'</div>'+
      '<div class="deck-card-meta">'+d.sub+' ・ 平均コスト '+avg+'</div></div></div>'+
      '<div class="deck-cards-grid">'+mini+'</div>'+
      '<a class="load-btn" href="'+url+'">▶ このデッキを作成ツールで開く</a>';
    wrap.appendChild(el);
  });
}

// decks.json（GASが更新）を優先。取得できなければ内蔵DECKSにフォールバック
fetch('decks.json', { cache: 'no-store' })
  .then(r => r.ok ? r.json() : null)
  .then(j => { const dk = (j && Array.isArray(j.decks) && j.decks.length) ? j.decks : DECKS; renderDecks(dk); })
  .catch(() => renderDecks(DECKS));
