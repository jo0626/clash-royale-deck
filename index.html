<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CR Deck Builder</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');
  /* ページ遷移をスライドに（対応ブラウザのみ。非対応は通常遷移） */
  @view-transition { navigation: auto; }
  @keyframes cr-slide-in-right { from { transform: translateX(100%); } to { transform: translateX(0); } }
  @keyframes cr-slide-out-left { from { transform: translateX(0); } to { transform: translateX(-30%); opacity: .4; } }
  ::view-transition-old(root) { animation: cr-slide-out-left .28s ease both; }
  ::view-transition-new(root) { animation: cr-slide-in-right .28s ease both; }

  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e2230;
    --border: rgba(255,255,255,0.07);
    --border-hi: rgba(255,255,255,0.15);
    --text: #e8eaf0;
    --text-muted: #6b7080;
    --text-dim: #3a3f50;
    --accent: #e8a020;
    --accent2: #c0781a;
    --red: #e05050;
    --font-head: 'Rajdhani', sans-serif;
    --font-body: 'Noto Sans JP', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 14px; touch-action: manipulation; } /* ダブルタップ拡大無効（ピンチ拡大は可） */
  body { touch-action: manipulation; }
  /* ダブルタップ拡大を全要素で無効化（ピンチ拡大は維持）。.right と .scrub-bar の touch-action:none は specificity で優先される */
  * { touch-action: manipulation; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: var(--font-head);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
  }
  .logo span { color: var(--text-muted); font-size: 12px; font-family: var(--font-body); font-weight: 400; letter-spacing: 0; display: block; margin-top: -4px; }

  /* ページ切替ナビ（全ページ共通） */
  .nav-icons { display: flex; gap: 4px; margin-left: auto; }
  .nav-icon { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; border-radius: 8px; text-decoration: none; border: 1px solid var(--border); background: var(--surface2); transition: all 0.12s; }
  .nav-icon .nav-emoji { font-size: 17px; line-height: 1; }
  @media (hover: hover) { .nav-icon:hover { border-color: var(--border-hi); background: var(--surface); transform: translateY(-1px); } }
  .nav-icon.active { border-color: var(--accent); background: rgba(232,160,32,0.12); }

  .app {
    display: grid;
    grid-template-columns: 400px 1fr;
    height: calc(100vh - 54px);
    overflow: hidden;
  }

  .left {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .right {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--surface);
    border-right: 1px solid var(--border);
  }

  .controls {
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .controls-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  .search-wrap { position: relative; flex: 1; min-width: 140px; }
  .search-wrap svg { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); opacity: 0.4; pointer-events: none; }
  .search-clear {
    position: absolute; right: 4px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); font-size: 20px; line-height: 1;
    width: 34px; height: 34px; padding: 0; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .search-clear.visible { opacity: 0.55; pointer-events: auto; }
  @media (hover: hover) { .search-clear:hover { opacity: 1; color: var(--text); } }
  input[type=text].has-value { padding-right: 40px; }
  input[type=text] {
    width: 100%; padding: 7px 10px 7px 30px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-family: var(--font-body);
    font-size: 16px; outline: none; transition: border-color 0.15s;
  }
  input[type=text]:focus { border-color: var(--accent); }

  .type-tabs { display: flex; gap: 2px; flex-wrap: wrap; }
  .ttab[data-type="evolved"].active { background: #8b5cf6; border-color: #8b5cf6; color: #fff; }
  .ttab[data-type="hero"].active { background: #e8a020; border-color: #e8a020; color: #000; }
  .ttab[data-type="champion"].active { background: #e05050; border-color: #e05050; color: #fff; }
  .ttab {
    padding: 5px 10px; font-size: 12px; font-family: var(--font-body);
    border: 1px solid var(--border); background: transparent;
    color: var(--text-muted); border-radius: 4px; cursor: pointer; transition: all 0.1s; white-space: nowrap;
  }
  .ttab.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }
  /* お気に入りタブ（インスタ風SVGハート・オンオフトグル） */
  .ttab[data-type="fav"] { display: inline-flex; align-items: center; justify-content: center; padding: 4px 8px; }
  .ttab[data-type="fav"] svg { display: block; }
  .ttab[data-type="fav"] svg .heart-fill { fill: none; }
  .ttab[data-type="fav"] svg .heart-stroke { stroke: rgba(255,255,255,0.45); stroke-width: 1.8; }
  .ttab[data-type="fav"].active { background: rgba(232,48,74,0.14); border-color: #e8304a; }
  .ttab[data-type="fav"].active svg .heart-fill { fill: #e8304a; }
  .ttab[data-type="fav"].active svg .heart-stroke { stroke: #e8304a; }

  .cost-filters { display: flex; gap: 4px; flex-wrap: wrap; }
  .cfbtn {
    width: 28px; height: 28px; border-radius: 50%;
    border: 1px solid var(--border); background: transparent;
    color: var(--text-muted); font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.1s;
  }
  @media (hover: hover) {
    .cfbtn:hover:not(.active) { border-color: var(--border-hi); color: var(--text); }
    .ttab:hover:not(.active) { border-color: var(--border-hi); color: var(--text); }
  }
  .cfbtn.active { color: #000; font-weight: 700; }
  .cfbtn[data-c="1"].active { background:#4caf50; border-color:#4caf50; }
  .cfbtn[data-c="2"].active { background:#26c6a0; border-color:#26c6a0; }
  .cfbtn[data-c="3"].active { background:#3a8ef0; border-color:#3a8ef0; }
  .cfbtn[data-c="4"].active { background:#e8a020; border-color:#e8a020; }
  .cfbtn[data-c="5"].active { background:#8b5cf6; border-color:#8b5cf6; }
  .cfbtn[data-c="6"].active { background:#e05050; border-color:#e05050; }
  .cfbtn[data-c="7"].active { background:#c0781a; border-color:#c0781a; }
  .cfbtn[data-c="8"].active { background:#888; border-color:#888; }
  .cfbtn[data-c="9"].active { background:#e8eaf0; border-color:#e8eaf0; color:#000; }

  .count-info { font-size: 11px; color: var(--text-muted); }

  /* card list */
  .card-list {
    overflow-y: auto; flex: 1; padding: 10px 12px;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 6px; align-content: start;
  }
  .card-list::-webkit-scrollbar { width: 4px; }
  .card-list::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 10px 12px; cursor: pointer;
    transition: all 0.12s; user-select: none; -webkit-user-select: none; position: relative;
    overflow: hidden; min-height: 100px;
    -webkit-touch-callout: none;
  }
  .card-img {
    position: absolute; right: -4px; bottom: -4px;
    width: 88px; height: 88px;
    object-fit: contain;
    opacity: 0.8;
    pointer-events: none;
    transition: opacity 0.12s;
    filter: saturate(0.6);
  }
  @media (hover: hover) {
    .card:hover .card-img { opacity: 0.9; }
    .card:hover { border-color: var(--border-hi); background: var(--surface2); transform: translateY(-1px); }
  }
  .card.in-deck .card-img { opacity: 0.85; filter: saturate(1); }
  .card.in-deck {
    border-color: var(--border);
    background: var(--surface);
    opacity: 0.45;
    cursor: not-allowed;
    pointer-events: none;
  }
  .card.in-deck .fav-btn { pointer-events: auto; cursor: pointer; }
  .card.in-deck .card-img { filter: saturate(0) brightness(0.7); opacity: 0.4; }

  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 4px; margin-bottom: 4px; }
  .card-name { font-size: 11px; font-weight: 500; color: var(--text); line-height: 1.3; flex: 1; padding-right: 58px; word-break: break-all; }

  .cost-pip {
    width: 20px; height: 20px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0;
  }
  .pip-1{background:#1a3d1a;color:#4caf50;} .pip-2{background:#0d2e28;color:#26c6a0;}
  .pip-3{background:#0d1e3d;color:#3a8ef0;} .pip-4{background:#3d2a00;color:#e8a020;}
  .pip-5{background:#200d3d;color:#8b5cf6;} .pip-6{background:#3d0d0d;color:#e05050;}
  .pip-7{background:#2a1500;color:#c0781a;} .pip-8{background:#1a1a1a;color:#888;}
  .pip-9{background:#1a1a2a;color:#9090d0;}

  .card-bottom { display: flex; align-items: center; justify-content: space-between; }
  .card-role { font-size: 9px; color: var(--text-muted); flex: 1; padding-right: 76px; line-height: 1.4; position: relative; z-index: 1; word-break: break-all; }

  .type-tag { display: inline-block; font-size: 9px; padding: 1px 5px; border-radius: 3px; margin-bottom: 3px; max-width: calc(100% - 52px); }
  .tag-troop{background:rgba(58,142,240,0.15);color:#3a8ef0;}
  .tag-spell{background:rgba(139,92,246,0.15);color:#8b5cf6;}
  .tag-building{background:rgba(232,160,32,0.15);color:#e8a020;}
  .tag-champion{background:rgba(224,80,80,0.15);color:#e05050;}
  .tag-hero{background:rgba(232,160,32,0.2);color:#e8a020;border:1px solid rgba(232,160,32,0.4);}

  /* ハートボタン — 右上絶対配置・SVGインスタ風 */
  .fav-btn {
    position: absolute; top: 5px; right: 5px;
    background: none; border: none; cursor: pointer;
    padding: 4px; line-height: 1; z-index: 2;
    transition: transform 0.15s;
    touch-action: manipulation;
  }
  .fav-btn svg .heart-fill { fill: none; }
  .fav-btn svg .heart-stroke { stroke: rgba(255,255,255,0.35); stroke-width: 1.6; }
  /* ハートのポップアニメ（全デバイス共通・モバイルのタップでも動く） */
  @keyframes heartPop {
    0%   { transform: scale(1); }
    30%  { transform: scale(1.5); }
    60%  { transform: scale(0.9); }
    100% { transform: scale(1); }
  }
  .fav-btn.pop { animation: heartPop 0.35s ease; }
  @media (hover: hover) {
    .fav-btn:hover { transform: scale(1.15); }
    .fav-btn:hover svg .heart-stroke { stroke: rgba(255,255,255,0.65); }
  }
  .fav-btn.active svg .heart-fill { fill: #e8304a; }
  .fav-btn.active svg .heart-stroke { stroke: #e8304a; }

  /* RIGHT PANEL */
  .deck-header { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); display: flex; align-items: center; flex-wrap: wrap; gap: 6px 12px; }
  .deck-title {
    font-family: var(--font-head); font-size: 18px; font-weight: 700;
    letter-spacing: 1px; color: var(--text); text-transform: uppercase;
    display: flex; align-items: baseline; gap: 8px;
  }
  .deck-count { font-size: 13px; font-weight: 400; color: var(--text-muted); font-family: var(--font-body); }
  .avg-row { display: flex; align-items: baseline; gap: 6px; }
  .avg-label { font-size: 11px; color: var(--text-muted); }
  .avg-val { font-family: var(--font-head); font-size: 28px; font-weight: 700; color: var(--accent); line-height: 1; }
  .avg-sub { font-size: 11px; color: var(--text-muted); }
  /* ドラッグ中の平均コスト・プレビュー表示（点滅で「仮」と分かるように） */
  .deck-header.previewing .avg-val { color: #3a8ef0; }
  .deck-header.previewing .avg-val::after { content: ' ▶'; font-size: 11px; color: #3a8ef0; }
  /* 保存デッキ呼び出しボタン */
  /* デッキスロット表示（クリア/保存 と デッキ分析へ の中央）。数字だけでスロットと分かる見た目 */
  .slot-load-btn { flex: 0 0 auto; display: inline-flex; flex-direction: column; align-items: center; justify-content: center;
    background: var(--surface2); border: 1px solid var(--border-hi); color: var(--text); border-radius: 8px;
    width: 46px; min-height: 38px; padding: 3px 4px; cursor: pointer; font-family: inherit; line-height: 1;
    user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; }
  .slot-load-btn .sl-cap { font-size: 7px; letter-spacing: 1px; color: var(--text-muted); font-family: var(--font-head); }
  .slot-load-btn #slotLoadNum { font-family: var(--font-head); font-weight: 700; font-size: 18px; color: var(--accent); }
  /* 4アイコンは平均コスト行の右端へ */
  .deck-header .deck-nav { display: flex; gap: 4px; margin-left: auto; }
  /* コストバーは行の下に全幅で */
  .cost-bar { flex-basis: 100%; }
  /* 保存スロット選択（横スクロール） */
  .slot-pop { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; align-items: center; justify-content: center; }
  .slot-pop-box { background: var(--surface); border: 1px solid var(--border-hi); border-radius: 14px; padding: 16px; width: min(360px, 92vw); }
  .slot-pop-title { font-size: 13px; font-weight: 700; text-align: center; margin-bottom: 12px; }
  .slot-strip { display: flex; gap: 10px; overflow-x: auto; padding: 4px 2px 10px; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
  .slot-chip { scroll-snap-align: center; flex: 0 0 auto; width: 96px; min-height: 92px; border-radius: 12px; border: 1px solid var(--border);
    background: var(--surface2); cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; padding: 8px 6px; color: var(--text); }
  .slot-chip .num { font-family: var(--font-head); font-size: 28px; font-weight: 700; color: var(--accent); line-height: 1; }
  .slot-chip .nm { font-size: 10px; color: var(--text-muted); text-align: center; line-height: 1.2; word-break: break-all; }
  /* 保存スロット選択：スクロールせず5枠を一度に表示（パッと選べる） */
  .slot-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; padding: 4px 0 10px; }
  .slot-grid .slot-chip { width: auto; min-width: 0; min-height: 78px; padding: 8px 2px; }
  .slot-grid .slot-chip .num { font-size: 22px; }
  .slot-grid .slot-chip .nm { font-size: 8px; }
  .slot-chip.empty { opacity: 0.5; }
  /* SNS共有ダイアログ */
  .share-btns { display: flex; flex-direction: column; gap: 8px; margin: 12px 0 4px; }
  .share-b { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 11px; border-radius: 8px;
    font-size: 14px; font-weight: 700; cursor: pointer; border: none; text-decoration: none; font-family: inherit; }
  .share-b.sns-native { background: var(--accent); color: #000; }
  .share-b.sns-x { background: #000; color: #fff; border: 1px solid var(--border-hi); }
  .share-b.sns-line { background: #06c755; color: #fff; }
  .share-b.sns-copy { background: var(--surface2); color: var(--text); border: 1px solid var(--border-hi); }
  .slot-chip.current { border-color: var(--accent); background: rgba(232,160,32,0.12); }
  /* 📁長押しで出る横スクラブ操作バー（なぞるとデッキがリアルタイムに変わる） */
  .scrub-hint { position: fixed; left: 50%; transform: translateX(-50%); z-index: 1102;
    font-size: 11px; color: var(--text); background: rgba(0,0,0,0.6); padding: 4px 10px; border-radius: 8px; white-space: nowrap; pointer-events: none; }
  .scrub-bar { position: fixed; left: 50%; transform: translateX(-50%); z-index: 1101;
    background: var(--surface); border: 1px solid var(--border-hi); border-radius: 999px; padding: 8px 12px;
    display: flex; gap: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.55); touch-action: none; user-select: none; -webkit-user-select: none; max-width: 94vw; overflow: hidden; }
  .scrub-seg { width: 46px; height: 46px; flex: 0 0 auto; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: var(--font-head); font-weight: 700; color: var(--text-muted); background: var(--surface2); border: 1px solid var(--border); transition: transform 0.1s, background 0.1s; cursor: pointer; }
  .scrub-seg .sn { font-size: 18px; line-height: 1; }
  .scrub-seg .snm { font-size: 7px; max-width: 42px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .scrub-seg.on { background: var(--accent); color: #000; transform: scale(1.15); }

  .cost-bar { display: flex; gap: 2px; margin-top: 8px; height: 4px; border-radius: 2px; overflow: hidden; }
  .bar-seg { height: 100%; transition: flex 0.3s; }

  .deck-slots {
    overflow-y: auto; padding: 10px 12px;
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    grid-template-rows: repeat(2, auto);
    gap: 6px;
    align-content: start;
    min-height: 0;
  }
  .slot {
    background: var(--surface2); border: 1px dashed var(--border);
    border-radius: 6px; height: 160px;
    min-width: 0; max-width: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start;
    padding: 6px 4px 6px; gap: 4px;
    transition: all 0.15s;
    overflow: visible;
    cursor: default;
    user-select: none; -webkit-user-select: none;
    -webkit-touch-callout: none;
    position: relative;
  }
  .slot-img-wrap {
    flex: 1; display: flex; align-items: center; justify-content: center;
    width: 100%; min-height: 0;
  }
  .slot-img {
    width: 86px; height: 86px; max-width: 100%; object-fit: contain;
    opacity: 0.9; pointer-events: none;
    filter: saturate(1);
    transition: opacity 0.12s;
    display: block;
  }
  @media (hover: hover) { .slot.filled:hover .slot-img { opacity: 0.25; } }
  .slot.filled { border-style: solid; border-color: var(--border-hi); background: var(--surface); cursor: pointer; }
  .slot-info {
    display: flex; align-items: flex-start; gap: 4px;
    width: 100%; flex-shrink: 0;
  }
  .slot-info .cost-pip {
    width: 20px; height: 20px; font-size: 11px; flex-shrink: 0; margin-top: 1px;
  }
  /* 特殊スロット：本家風の立体・豪華デザイン */
  .slot.slot-evolved {
    border: 2px solid transparent;
    background:
      radial-gradient(ellipse at 50% 30%, #332158 0%, #221540 55%, #18102e 100%) padding-box,
      linear-gradient(165deg, #c4b5fd 0%, #7c3aed 45%, #3b2a6e 100%) border-box;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.14), inset 0 -10px 18px rgba(139,92,246,0.22), 0 0 12px rgba(139,92,246,0.30);
  }
  .slot.slot-hero {
    border: 2px solid transparent;
    background:
      radial-gradient(ellipse at 50% 30%, #4a3410 0%, #33240c 55%, #221806 100%) padding-box,
      linear-gradient(165deg, #ffe08a 0%, #e8a020 45%, #8a5c08 100%) border-box;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.16), inset 0 -10px 18px rgba(232,160,32,0.20), 0 0 12px rgba(232,160,32,0.30);
  }
  .slot.slot-wild {
    border: 2px solid transparent;
    background:
      linear-gradient(90deg, #221540 0%, #221540 50%, #33240c 50%, #33240c 100%) padding-box,
      linear-gradient(90deg, #a78bfa 0%, #7c3aed 48%, #e8a020 52%, #ffd27a 100%) border-box;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.12), inset -8px -8px 16px rgba(232,160,32,0.14), inset 8px -8px 16px rgba(139,92,246,0.16), 0 0 12px rgba(190,130,120,0.25);
  }
  .slot-empty-center { flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; }
  /* 宝石風◇アイコン */
  .slot-empty-icon { width: 36px; height: 36px; transform: rotate(45deg); border-radius: 8px; display: block; position: relative; }
  .slot-empty-icon::after {
    content: ''; position: absolute; inset: 4px 4px 50% 50%;
    border-radius: 4px;
    background: linear-gradient(135deg, rgba(255,255,255,0.55), rgba(255,255,255,0) 70%);
    pointer-events: none;
  }
  .diamond-evolved {

let deck = [null,null,null,null,null,null,null,null];
let favorites = JSON.parse(localStorage.getItem('cr_favorites') || '[]');
let activeTypes = new Set(); // 複数選択。空＝全て表示
// カードが指定タイプに該当するか（type or 進化/英雄/チャンピオンのフラグ）
function cardMatchesType(c, t) {
  if (t === 'evolved')   return !!c.evolved;
  if (t === 'hero')      return !!c.hero;
  if (t === 'champion')  return !!c.champion;
  return c.type === t;
}
// タブの選択ハイライトをactiveTypesに同期（全ては選択ゼロのとき点灯）
function syncTabUI() {
  document.querySelectorAll('.ttab:not([data-type="fav"])').forEach(x => {
    const ty = x.dataset.type;
    if (ty === 'all') x.classList.toggle('active', activeTypes.size === 0);
    else x.classList.toggle('active', activeTypes.has(ty));
  });
}
let activeCosts = new Set();
let favSort = (() => { try { return JSON.parse(localStorage.getItem('cr_favsort') || 'false'); } catch(e) { return false; } })(); // ❤トグル：ONでお気に入りを先頭に。リロードでも維持

function saveFavorites() {
  try { localStorage.setItem('cr_favorites', JSON.stringify(favorites)); } catch(e) {}
  // ログイン中はクラウドにも保存（端末間で維持）
  if (window.CRAuth && CRAuth.getUser()) { CRAuth.saveFavorites(favorites); }
}

function isFav(name) { return favorites.includes(name); }

let justFaved = null; // アニメーション対象のカード名
function toggleFav(name, e) {
  e.stopPropagation();
  if (isFav(name)) { openFavRemoveDialog(name); return; } // ミスタップ対策：外す時は確認
  favorites.push(name);
  saveFavorites();
  justFaved = name;
  render();
  justFaved = null;
}

// お気に入り解除の確認ダイアログ
function openFavRemoveDialog(name) {
  const ov = document.createElement('div');
  ov.className = 'swap-overlay';
  ov.innerHTML = `<div class="swap-box">
    <div class="swap-title">「${name}」をお気に入りから外す？</div>
    <div class="swap-options">
      <button class="btn swap-remove-btn">外す</button>
      <button class="btn btn-ghost swap-keep-btn">キャンセル</button>
    </div>
  </div>`;
  ov.onclick = e => { if (e.target === ov) ov.remove(); };
  ov.querySelector('.swap-keep-btn').onclick = () => ov.remove();
  ov.querySelector('.swap-remove-btn').onclick = () => {
    favorites = favorites.filter(f => f !== name);
    saveFavorites();
    ov.remove();
    render();
  };
  document.body.appendChild(ov);
}


let lastDeckCount = 0;

function triggerSlotAnim(idx) {
  setTimeout(() => {
    const slots = document.querySelectorAll('.slot');
    if (slots[idx]) {
      slots[idx].classList.remove('just-added');
      void slots[idx].offsetWidth;
      slots[idx].classList.add('just-added');
      slots[idx].addEventListener('animationend', () => slots[idx].classList.remove('just-added'), {once:true});
    }
  }, 30);
}

function triggerCompleteAnim() {
  // フラッシュ
  const flash = document.createElement('div');
  flash.className = 'complete-flash';
  document.body.appendChild(flash);
  flash.addEventListener('animationend', () => flash.remove());

  // テキスト
  const txt = document.createElement('div');
  txt.className = 'complete-text';
  txt.textContent = 'COMPLETE!';
  document.body.appendChild(txt);
  txt.addEventListener('animationend', () => txt.remove());

  // パーティクル
  const colors = ['#e8a020','#8b5cf6','#3a8ef0','#e8304a','#26c6a0','#fff'];
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  for (let i = 0; i < 24; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (i / 24) * Math.PI * 2;
    const dist = 120 + Math.random() * 160;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist;
    p.style.cssText = `left:${cx}px;top:${cy}px;background:${colors[i%colors.length]};--fly:translate(${dx}px,${dy}px);animation-delay:${Math.random()*0.2}s;animation-duration:${0.8+Math.random()*0.6}s;`;
    document.body.appendChild(p);
    p.addEventListener('animationend', () => p.remove());
  }
}

function updateEnergyBar() {
  const count = deck.filter(d=>d).length;
  const wrap = document.getElementById('energyBarWrap');
  const bar = document.getElementById('energyBar');
  if (!wrap || !bar) return;
  if (count === 0) {
    wrap.style.display = 'none';
    return;
  }
  wrap.style.display = 'block';
  bar.style.width = (count / 8 * 100) + '%';

  // 追加時のみアニメ
  if (count > lastDeckCount) {
    // 追加されたスロットのidxを探す
    let newIdx = -1;
    for (let i = 0; i < 8; i++) {
      if (deck[i] && !window._prevDeck?.[i]) { newIdx = i; break; }
    }
    if (newIdx >= 0) triggerSlotAnim(newIdx);
    if (count === 8) setTimeout(triggerCompleteAnim, 100);
  }
  window._prevDeck = deck.map(d => d ? d.name : null);
  lastDeckCount = count;
}

function init() {
  const cf = document.getElementById('costFilters');
  [1,2,3,4,5,6,7,8,9].forEach(c => {
    const b = document.createElement('button');
    b.className = 'cfbtn'; b.dataset.c = c; b.textContent = c; b.title = c + 'コスト';
    b.onclick = () => { b.classList.toggle('active'); activeCosts.has(c) ? activeCosts.delete(c) : activeCosts.add(c); render(); };
    cf.appendChild(b);
  });

  document.querySelectorAll('.ttab').forEach(t => {
    t.onclick = () => {
      if (t.dataset.type === 'fav') {
        favSort = !favSort;
        try { localStorage.setItem('cr_favsort', JSON.stringify(favSort)); } catch(e) {}
        t.classList.toggle('active', favSort);
        render();
        return;
      }
      if (t.dataset.type === 'all') {
        // 全て：選択を全部クリア
        activeTypes.clear();
        syncTabUI();
        render();
        return;
      }
      // 非all・非favタブ
      const type = t.dataset.type;
      const isMobile = window.matchMedia('(max-width: 720px)').matches;
      if (isMobile) {
        // 携帯：単一選択（同じタブ再タップで解除＝全て、別タブで入れ替え）
        if (activeTypes.has(type) && activeTypes.size === 1) activeTypes.clear();
        else { activeTypes.clear(); activeTypes.add(type); }
      } else {
        // PC：複数選択トグル
        if (activeTypes.has(type)) activeTypes.delete(type);
        else activeTypes.add(type);
      }
      syncTabUI();
      render();
    };
  });
  // 永続化された❤トグル状態をUIに反映
  const favTabEl = document.querySelector('.ttab[data-type="fav"]');
  if (favTabEl) favTabEl.classList.toggle('active', favSort);

  const cardListEl = document.getElementById('cardList');
  cardListEl.addEventListener('dragover', e => {
    e.preventDefault();
    // デッキから1枚抜く場合の平均コストを仮表示
    if (dragSrcIdx !== null) { const hyp = deck.slice(); hyp[dragSrcIdx] = null; previewStats(hyp); }
  });
  cardListEl.addEventListener('dragleave', () => clearPreviewStats());
  cardListEl.addEventListener('drop', e => {
    e.preventDefault();
    clearPreviewStats();
    if (dragSrcIdx !== null) {
      deck[dragSrcIdx] = null;
      dragSrcIdx = null;
      renderDeck(); render();
    }
  });
  const searchEl = document.getElementById('search');
  const clearBtn2 = document.getElementById('searchClear');
  // 検索を始める前の一覧スクロール位置を覚えておく（解除時にそこへ戻す）
  let listScrollMemo = 0;
  cardListEl.addEventListener('scroll', () => {
    if (!searchEl.value) listScrollMemo = cardListEl.scrollTop;
  }, { passive: true });
  const restoreListScroll = () => {
    // render()で一覧が作り直されるので、次フレームで元の位置へ
    requestAnimationFrame(() => { cardListEl.scrollTop = listScrollMemo; });
  };
  // Enter/改行（確定後）でキーボードを閉じる
  searchEl.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); searchEl.blur(); }
  });
  // フォーム化していないが、念のため送信相当の確定でもblur
  searchEl.addEventListener('search', () => searchEl.blur());
  searchEl.oninput = () => {
    const has = searchEl.value.length > 0;
    clearBtn2.classList.toggle('visible', has);
    searchEl.classList.toggle('has-value', has);
    render();
    if (!has) restoreListScroll(); // 手動で全部消したときも元の位置へ
  };
  // ✕：キーボードの開閉状態を変えずにテキストだけ消す
  // （開いてたら開いたまま／閉じてたら閉じたまま）
  const doClear = (e) => {
    e.preventDefault(); // ボタンにフォーカスを移さない＝入力欄の状態を維持
    searchEl.value = '';
    clearBtn2.classList.remove('visible');
    searchEl.classList.remove('has-value');
    render();
    restoreListScroll(); // 検索を始める前のスクロール位置へ戻す
  };
  clearBtn2.addEventListener('pointerdown', doClear);
  document.getElementById('clearBtn').onclick = () => { deck = [null,null,null,null,null,null,null,null]; renderDeck(); render(); };
  document.getElementById('saveBtn').onclick = openSlotSaveDialog;
  initSlotScrub();
  document.getElementById('analyzeBtn').addEventListener('click', (e) => {
    // 8枚そろってない時は分析ページへ行かせない
    if (deck.filter(Boolean).length < 8) { e.preventDefault(); showToast('8枚そろうと分析できます'); }
  });

  render();
  renderDeck();
  initTouchDnD();
}

// ひらがな→カタカナ変換（検索用）
function toKatakana(str) {
  return str.replace(/[ぁ-ゖ]/g, ch => String.fromCharCode(ch.charCodeAt(0) + 0x60));
}

function getFiltered() {
  const raw = document.getElementById('search').value;
  const q = toKatakana(raw.toLowerCase());
  let res = CARDS.filter(c => {
    // 進化/英雄/チャンピオンはtype(troop/spell/building)ではなくフラグで判定
    // 複数選択：いずれかに該当すれば表示（OR）。空なら全て表示
    if (activeTypes.size > 0 && ![...activeTypes].some(t => cardMatchesType(c, t))) return false;
    if (activeCosts.size > 0 && !activeCosts.has(c.cost)) return false;
    if (q) {
      const nameMatch = toKatakana(c.name.toLowerCase()).includes(q);
      const yomiMatch = c.yomi && toKatakana(c.yomi.toLowerCase()).includes(q);
      if (!nameMatch && !yomiMatch) return false;
    }
    return true;
  });
  if (favSort) {
    // お気に入りを先頭に（元の並び順は維持）
    res = res.filter(c => isFav(c.name)).concat(res.filter(c => !isFav(c.name)));
  }
  return res;
}

function render() {
  const filtered = getFiltered();
  document.getElementById('countInfo').textContent = filtered.length + ' / ' + CARDS.length + ' 枚';
  const list = document.getElementById('cardList');
  list.innerHTML = '';
  filtered.forEach(c => {
    const inDeck = deck.some(d => d && d.name === c.name);
    const faved = isFav(c.name);
    const div = document.createElement('div');
    div.className = 'card' + (inDeck ? ' in-deck' : '');
    const tagClass = c.champion ? 'tag-champion' : c.hero ? 'tag-hero' : 'tag-' + c.type;
    const tagText = c.champion ? 'チャンピオン' : c.hero ? 'ヒーロー' : c.type === 'troop' ? 'ユニット' : c.type === 'spell' ? '呪文' : '建物';
    const heartSvg = `<svg width="20" height="19" viewBox="0 0 24 22" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path class="heart-fill heart-stroke" d="M12 20.5C12 20.5 2 13.5 2 7C2 4.2 4.2 2 7 2C9 2 10.8 3.1 12 4.7C13.2 3.1 15 2 17 2C19.8 2 22 4.2 22 7C22 13.5 12 20.5 12 20.5Z" stroke-linejoin="round" stroke-linecap="round"/>
    </svg>`;
    // 進化タブなら進化後画像、英雄タブなら英雄画像を表示（無ければ通常画像）
    const cardImgSrc = (activeTypes.has('evolved') && c.imgEvolved) ? c.imgEvolved
                     : (activeTypes.has('hero') && c.imgHero) ? c.imgHero
                     : c.img;
    const imgHtml = cardImgSrc ? `<img class="card-img" src="${cardImgSrc}" alt="" loading="lazy">` : '';
    div.innerHTML = `
      ${imgHtml}
      <button class="fav-btn ${faved ? 'active' : ''}${justFaved === c.name ? ' pop' : ''}" title="${faved ? 'お気に入り解除' : 'お気に入り追加'}" onclick="toggleFav('${c.name}', event)">${heartSvg}</button>
      <div class="card-top">
        <div class="cost-pip pip-${Math.min(c.cost,9)}">${c.cost}</div>
        <div class="card-name">${c.name}</div>
      </div>
      <span class="type-tag ${tagClass}">${tagText}</span>
      <div class="card-bottom">
        <div class="card-role">${c.role}</div>
      </div>`;
    div.draggable = true;
    div.addEventListener('dragstart', e => {
      if (deck.some(d => d && d.name === c.name)) { e.preventDefault(); return; }
      dragSrcCard = c;
      dragSrcIdx = null;
      div.style.opacity = '0.4';
      e.dataTransfer.effectAllowed = 'move';
    });
    div.addEventListener('dragend', e => { div.style.opacity = ''; dragSrcCard = null; });
    div.onclick = () => toggleDeck(c);
    list.appendChild(div);
  });
}


// ヒーロー配置ルール：idx1（スロット2）かidx2（スロット3）のみ
function championCanGoTo(slotIdx) { return slotIdx === 1 || slotIdx === 2; }

// ヒーローの優先配置先を返す（スロット2→スロット3の順）
function championTargetSlot() {
  if (deck[1] === null) return 1;
  if (deck[2] === null) return 2;
  return -1;
}

function addToDeck(card) {
  if (deck.some(d => d && d.name === card.name)) return;
  if (card.champion) {
    if (deck.some(d => d && d.champion)) { showToast('⚠ チャンピオンは1枚まで'); return; }
    const idx = championTargetSlot();
    if (idx === -1) { openChampSwapDialog(card); return; }
    deck[idx] = card;
  } else {
    // 通常カード：スロット2・3以外の空きに入れる（ただし空いてれば入れる）
    const emptyIdx = deck.findIndex((d, i) => d === null);
    if (emptyIdx === -1) { showToast('⚠ デッキは8枚まで'); return; }
    deck[emptyIdx] = card;
  }
  renderDeck(); render();
}

// チャンピオン追加時、スロット2・3が非チャンピオンで埋まっている場合の入れ替えダイアログ
function openChampSwapDialog(card) {
  const ov = document.createElement('div');
  ov.className = 'swap-overlay';
  const opts = [1, 2].map(i => {
    const d = deck[i];
    return `<div class="swap-opt" data-idx="${i}">
      ${d.img ? `<img src="${d.img}" alt="">` : ''}
      <div class="swap-opt-name">${d.name}</div>
      <div class="swap-opt-slot">スロット${i + 1}</div>
    </div>`;
  }).join('');
  ov.innerHTML = `<div class="swap-box">
    <div class="swap-title">${card.name} をどちらと入れ替える？</div>
    <div class="swap-options">${opts}</div>
    <button class="btn btn-ghost swap-cancel">キャンセル</button>
  </div>`;
  ov.onclick = e => { if (e.target === ov) ov.remove(); };
  ov.querySelector('.swap-cancel').onclick = () => ov.remove();
  ov.querySelectorAll('.swap-opt').forEach(o => {
    o.onclick = () => {
      const i = +o.dataset.idx;
      const displaced = deck[i];
      deck[i] = card;
      const empty = deck.findIndex(d => d === null);
      if (empty >= 0) {
        deck[empty] = displaced;
        showToast(displaced.name + ' をスロット' + (empty + 1) + 'へ移動');
      } else {
        showToast(displaced.name + ' をデッキから外しました');
      }
      ov.remove();
      renderDeck(); render();
    };
  });
  document.body.appendChild(ov);
}

function removeFromDeck(card) {
  const idx = deck.findIndex(d => d && d.name === card.name);
  if (idx >= 0) { deck[idx] = null; renderDeck(); render(); }
}


let dragSrcIdx = null;
let dragSrcCard = null;

function onDragStart(e) {
  dragSrcIdx = parseInt(this.dataset.idx);
  dragSrcCard = null;
  this.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function onDragEnd(e) {
  document.querySelectorAll('.slot').forEach(s => {
    s.classList.remove('dragging', 'drag-over');
  });
  clearPreviewStats();
  // カード選択ゾーン上でドロップ終了→キャンセル
  if (dragSrcIdx !== null) {
    const el = document.elementFromPoint(e.clientX, e.clientY);
    if (el && el.closest('#cardList')) {
      deck[dragSrcIdx] = null;
      dragSrcIdx = null;
      renderDeck(); render();
    }
  }
  dragSrcIdx = null;
  dragSrcCard = null;
}

// ドラッグ中、その枠に置いた/入れ替えた場合の仮デッキを作る
function hypotheticalDeck(destIdx) {
  const hyp = deck.slice();
  if (dragSrcCard) {
    if (!deck.some(d => d && d.name === dragSrcCard.name)) hyp[destIdx] = dragSrcCard;
  } else if (dragSrcIdx !== null && dragSrcIdx !== destIdx) {
    const t = hyp[destIdx]; hyp[destIdx] = hyp[dragSrcIdx]; hyp[dragSrcIdx] = t;
  }
  return hyp;
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  this.classList.add('drag-over');
  if (dragSrcCard || dragSrcIdx !== null) previewStats(hypotheticalDeck(parseInt(this.dataset.idx))); // 平均コストを仮表示
}

function onDragLeave(e) {
  this.classList.remove('drag-over');
  clearPreviewStats();
}

function onDrop(e) {
  e.preventDefault();
  this.classList.remove('drag-over');
  clearPreviewStats();
  const destIdx = parseInt(this.dataset.idx);
  if (dragSrcCard) {
    const c = dragSrcCard;
    dragSrcCard = null;
    if (deck.some(d => d && d.name === c.name)) { showToast('⚠ すでに追加済み'); return; }
    if (c.champion && deck.some(d => d && d.champion)) { showToast('⚠ チャンピオンは1枚まで'); return; }
    if (c.champion && !championCanGoTo(destIdx)) { showToast('⚠ チャンピオンはスロット2か3のみ'); return; }
    deck[destIdx] = c;
    renderDeck(); render();
  } else if (dragSrcIdx !== null && dragSrcIdx !== destIdx) {
    const movingCard = deck[dragSrcIdx];
    const targetCard = deck[destIdx];
    // チャンピオンは2・3スロット以外に移動不可
    if (movingCard && movingCard.champion && !championCanGoTo(destIdx)) { showToast('⚠ チャンピオンはスロット2か3のみ'); return; }
    if (targetCard && targetCard.champion && !championCanGoTo(dragSrcIdx)) { showToast('⚠ チャンピオンはスロット2か3のみ'); return; }
    const tmp = deck[destIdx];
    deck[destIdx] = deck[dragSrcIdx];
    deck[dragSrcIdx] = tmp;
    dragSrcIdx = null;
    renderDeck(); render();
  }
}


// タッチD&D（モバイル・デッキスロット専用）
let touchSrcIdx = null;
let touchClone = null;
let touchSrcCard = null;
let touchOffsetX = 0;
let touchOffsetY = 0;

function createGhost(imgSrc, name, cost, size) {
  const ghost = document.createElement('div');
  ghost.style.cssText = [
    'position:fixed',
    'pointer-events:none',
    'z-index:9999',
    'width:' + size + 'px',
    'height:' + size + 'px',
    'border-radius:10px',
    'background:#1e2230',
    'border:2px solid rgba(58,142,240,0.8)',
    'display:flex',
    'flex-direction:column',
    'align-items:center',
    'justify-content:center',
    'gap:4px',
    'opacity:0.85',
    'box-shadow:0 4px 20px rgba(0,0,0,0.5)',
  ].join(';');
  if (imgSrc) {
    const img = document.createElement('img');
    img.src = imgSrc;
    img.style.cssText = 'width:60%;height:60%;object-fit:contain;';
    ghost.appendChild(img);
  }
  const label = document.createElement('div');
  label.textContent = name;
  label.style.cssText = 'font-size:9px;color:#e8eaf0;text-align:center;padding:0 4px;line-height:1.2;font-family:sans-serif;';
  ghost.appendChild(label);
  document.body.appendChild(ghost);
  return ghost;
}

function moveGhost(ghost, x, y) {
  const w = ghost.offsetWidth;
  const h = ghost.offsetHeight;
  ghost.style.left = (x - w/2) + 'px';
  ghost.style.top  = (y - h/2 - 20) + 'px';
}

let longPressTimer = null;
let touchStartX = 0;
let touchStartY = 0;
const LONG_PRESS_MS = 70;       // カード選択ゾーンの長押し判定
const LONG_PRESS_DECK_MS = 30;  // デッキゾーンは速めの応答
const DRAG_THRESHOLD = 10;
let isDragging = false;

function startDrag(srcCard, srcIdx, imgSrc, name, cost, x, y, srcEl) {
  isDragging = true;
  touchSrcCard = srcCard;
  touchSrcIdx = srcIdx;
  // ゴーストを作成して body に追加してから位置を設定
  touchClone = createGhost(imgSrc, name, cost, 90);
  // 次フレームで offsetWidth が確定してから位置設定
  requestAnimationFrame(() => {
    moveGhost(touchClone, x, y);
  });
  if (srcEl) srcEl.style.opacity = '0.3';
}

function cancelDrag() {
  clearTimeout(longPressTimer);
  longPressTimer = null;
  isDragging = false;
  clearPreviewStats();
  touchSrcCard = null;
  touchSrcIdx = null;
  if (touchClone) { touchClone.remove(); touchClone = null; }
  document.querySelectorAll('.slot').forEach(s => { s.classList.remove('drag-over'); s.style.opacity = ''; });
  document.querySelectorAll('.card').forEach(c => { c.style.opacity = ''; });
}

function initTouchDnD() {
  // カード選択ゾーン
  document.getElementById('cardList').addEventListener('touchstart', e => {
    if (e.target.closest('.fav-btn')) return; // ハートタップ時はドラッグしない
    const card = e.target.closest('.card');
    if (!card || card.classList.contains('in-deck')) return;
    const cardName = card.querySelector('.card-name').textContent.trim();
    const srcCard = CARDS.find(c => c.name === cardName);
    if (!srcCard) return;
    const t = e.touches[0];
    touchStartX = t.clientX; touchStartY = t.clientY;
    longPressTimer = setTimeout(() => {
      startDrag(srcCard, null, srcCard.img, srcCard.name, srcCard.cost, touchStartX, touchStartY, card);
    }, LONG_PRESS_MS);
  }, {passive:true});

  // デッキスロット
  document.getElementById('deckSlots').addEventListener('touchstart', e => {
    const slot = e.target.closest('.slot.filled');
    if (!slot) return;
    const idx = parseInt(slot.dataset.idx);
    const c = deck[idx];
    if (!c) return;
    const t = e.touches[0];
    touchStartX = t.clientX; touchStartY = t.clientY;
    longPressTimer = setTimeout(() => {
      startDrag(null, idx, c.img, c.name, c.cost, touchStartX, touchStartY, slot);
    }, LONG_PRESS_DECK_MS);
  }, {passive:true});

  document.addEventListener('touchmove', e => {
    const t = e.touches[0];
    // 長押し前に大きく動いたらキャンセル（スクロール優先）
    if (!isDragging) {
      const dx = Math.abs(t.clientX - touchStartX);
      const dy = Math.abs(t.clientY - touchStartY);
      if (dx > DRAG_THRESHOLD || dy > DRAG_THRESHOLD) {
        clearTimeout(longPressTimer);
        longPressTimer = null;
      }
      return;
    }
    e.preventDefault();
    if (touchClone) moveGhost(touchClone, t.clientX, t.clientY);
    document.querySelectorAll('.slot').forEach(s => s.classList.remove('drag-over'));
    const el = document.elementFromPoint(t.clientX, t.clientY);
    const target = el && el.closest('.slot');
    const onCardListNow = el && el.closest('#cardList');
    if (target) {
      target.classList.add('drag-over');
      // 置く/入れ替えた場合の平均コストを仮表示
      const destIdx = parseInt(target.dataset.idx);
      const hyp = deck.slice();
      if (touchSrcCard) { if (!deck.some(d => d && d.name === touchSrcCard.name)) hyp[destIdx] = touchSrcCard; }
      else if (touchSrcIdx !== null && touchSrcIdx !== destIdx) { const tmp = hyp[destIdx]; hyp[destIdx] = hyp[touchSrcIdx]; hyp[touchSrcIdx] = tmp; }
      previewStats(hyp);
    } else if (onCardListNow && touchSrcIdx !== null) {
      // デッキから抜く場合の平均コストを仮表示
      const hyp = deck.slice(); hyp[touchSrcIdx] = null; previewStats(hyp);
    } else {
      clearPreviewStats();
    }
  }, {passive:false});

  document.addEventListener('touchend', e => {
    clearTimeout(longPressTimer);
    longPressTimer = null;
    if (!isDragging) return;
    clearPreviewStats();
    const t = e.changedTouches[0];
    if (touchClone) { touchClone.remove(); touchClone = null; }
    document.querySelectorAll('.slot').forEach(s => { s.classList.remove('drag-over'); s.style.opacity = ''; });
    document.querySelectorAll('.card').forEach(c => { c.style.opacity = ''; });
    const el = document.elementFromPoint(t.clientX, t.clientY);
    const target = el && el.closest('.slot');
    const onCardList = el && el.closest('#cardList');
    if (touchSrcIdx !== null && onCardList) {
      // デッキ→カード選択ゾーンへドロップ＝キャンセル（削除）
      deck[touchSrcIdx] = null;
      renderDeck(); render();
    } else if (target) {
      const destIdx = parseInt(target.dataset.idx);
      if (touchSrcCard) {
        const c = touchSrcCard;
        if (deck.some(d => d && d.name === c.name)) { showToast('⚠ すでに追加済み'); }
        else if (c.champion && deck.some(d => d && d.champion)) { showToast('⚠ チャンピオンは1枚まで'); }
        else if (c.champion && !championCanGoTo(destIdx)) { showToast('⚠ チャンピオンはスロット2か3のみ'); }
        else { deck[destIdx] = c; renderDeck(); render(); }
      } else if (touchSrcIdx !== null && destIdx !== touchSrcIdx) {
        const movingCard = deck[touchSrcIdx];
        const targetCard = deck[destIdx];
        if (movingCard && movingCard.champion && !championCanGoTo(destIdx)) { showToast('⚠ チャンピオンはスロット2か3のみ'); }
        else if (targetCard && targetCard.champion && !championCanGoTo(touchSrcIdx)) { showToast('⚠ チャンピオンはスロット2か3のみ'); }
        else {
          const tmp = deck[destIdx];
          deck[destIdx] = deck[touchSrcIdx];
          deck[touchSrcIdx] = tmp;
          renderDeck(); render();
        }
      }
    }
    isDragging = false;
    touchSrcCard = null;
    touchSrcIdx = null;
  }, {passive:true});

  document.addEventListener('touchcancel', cancelDrag, {passive:true});
}
function toggleSlot2Mode(name, e) {
  e.stopPropagation();
  slot2Mode[name] = (slot2Mode[name] === 'hero') ? 'evolved' : 'hero';
  renderDeck();
}

function toggleDeck(card) { addToDeck(card); }


// スロットタイプ定義（0始まり、コの字順）
// idx0=進化枠, idx1=ヒーロー/チャンピオン枠, idx2=ワイルド枠, idx3-7=通常
// スロット2（idx=2）の選択モード（両方対応カードのみ有効）
let slot2Mode = {}; // key: カード名, value: "evolved" | "hero"

const SLOT_TYPE = ['evolved','hero','wild','normal','normal','normal','normal','normal'];

// どのスロットにも全カード置ける（制限なし）
function canPlace(card, slotIdx) { return true; }

// スロット位置とカード種類でモードを決定
function slotMode(card, slotIdx) {
  const st = SLOT_TYPE[slotIdx];
  if (st === 'evolved' && card.evolved) return 'evolved';
  if (st === 'hero'    && card.hero)    return 'hero';
  if (st === 'wild') {
    // 両方対応カードはslot2Modeの選択状態を参照（デフォルトはevolved）
    if (card.evolved && card.hero) return slot2Mode[card.name] || 'evolved';
    if (card.evolved) return 'evolved';
    if (card.hero)    return 'hero';
  }
  return 'normal';
}

const COST_COLORS = {1:'#4caf50',2:'#26c6a0',3:'#3a8ef0',4:'#e8a020',5:'#8b5cf6',6:'#e05050',7:'#c0781a',8:'#888',9:'#9090d0'};

function renderDeck() {
  const slots = document.getElementById('deckSlots');
  slots.innerHTML = '';
  for (let i = 0; i < 8; i++) {
    const div = document.createElement('div');
    const c = deck[i];
    const st = SLOT_TYPE[i];
    const slotClass = st === 'evolved' ? ' slot-evolved' : st === 'hero' ? ' slot-hero' : st === 'wild' ? ' slot-wild' : '';
    if (c) {
      const mode = slotMode(c, i);
      const modeClass = mode === 'evolved' ? ' slot-evolved' : mode === 'hero' ? ' slot-hero' : '';
      div.className = 'slot filled' + modeClass;
      div.title = 'クリックで外す';
      div.draggable = true;
      div.dataset.idx = i;
      const modeBadge = mode === 'evolved' ? '<span class="slot-badge evolved-badge">進化</span>'
                      : mode === 'hero'    ? '<span class="slot-badge hero-badge">英雄</span>' : '';
      const slotImgSrc = mode === 'evolved' && c.imgEvolved ? c.imgEvolved
                       : mode === 'hero'    && c.imgHero    ? c.imgHero
                       : c.img;
      const slotImg = slotImgSrc
        ? `<div class="slot-img-wrap"><img class="slot-img" src="${slotImgSrc}" alt="" loading="lazy"></div>`
        : `<div class="slot-img-wrap"></div>`;
      // wildスロット（idx=2）かつ進化・ヒーロー両方対応カード→切り替えボタン
      const showToggle = SLOT_TYPE[i] === 'wild' && c.evolved && c.hero;
      const toggleBtn = showToggle ? `<button class="mode-toggle-btn" onclick="toggleSlot2Mode('${c.name}', event)">
        ${mode === 'evolved' ? '⚡進化' : '👑英雄'}
      </button>` : '';
      div.innerHTML = `${slotImg}
        <div class="slot-info">
          <div class="cost-pip pip-${Math.min(c.cost,9)}">${c.cost}</div>
          <span class="slot-name">${c.name}${modeBadge}</span>
        </div>
        ${toggleBtn}`;
      div.onclick = () => removeFromDeck(c);
      div.addEventListener('dragstart', onDragStart);
      div.addEventListener('dragend',   onDragEnd);
      div.addEventListener('dragover',  onDragOver);
      div.addEventListener('dragleave', onDragLeave);
      div.addEventListener('drop',      onDrop);
    } else {
      div.className = 'slot' + slotClass;
      div.dataset.idx = i;
      const emptyContent = st === 'evolved' ? '<span class="slot-empty-icon diamond-evolved" title="進化"></span>'
                         : st === 'hero'    ? '<span class="slot-empty-icon diamond-hero" title="ヒーロー/チャンピオン"></span>'
                         : st === 'wild'    ? '<span class="slot-empty-icon diamond-wild" title="進化/ヒーロー"></span>'
                         : '<span class="slot-empty-text">+</span>';
      div.innerHTML = `<div class="slot-empty-center">${emptyContent}</div>`;
      div.addEventListener('dragover',  onDragOver);
      div.addEventListener('dragleave', onDragLeave);
      div.addEventListener('drop',      onDrop);
    }
    slots.appendChild(div);
  }

  updateActionButtons();
  showDeckStats(deck); // 実デッキの統計を表示
}

// 平均コスト・枚数・コストバーを指定の8枠配列から表示（プレビューにも使う）
let _previewActive = false;
function showDeckStats(arr) {
  const filled = arr.filter(d => d);
  document.getElementById('deckCount').textContent = filled.length + '/8';
  if (filled.length > 0) {
    const avg = (filled.reduce((s, c) => s + (c.cost || 0), 0) / filled.length);
    document.getElementById('avgVal').textContent = avg.toFixed(2);
    document.getElementById('avgSub').textContent = filled.length < 8 ? '（' + filled.length + '枚）' : '';
  } else {
    document.getElementById('avgVal').textContent = '—';
    document.getElementById('avgSub').textContent = '';
  }
  const bar = document.getElementById('costBar');
  bar.innerHTML = '';
  if (filled.length > 0) {
    const counts = {};
    filled.forEach(c => counts[c.cost] = (counts[c.cost] || 0) + 1);
    Object.entries(counts).sort((a, b) => +a[0] - +b[0]).forEach(([cost, cnt]) => {
      const seg = document.createElement('div');
      seg.className = 'bar-seg'; seg.style.flex = cnt;
      seg.style.background = COST_COLORS[cost] || '#888';
      seg.title = cost + 'コスト × ' + cnt;
      bar.appendChild(seg);
    });
  }
}

  const base = location.origin + location.pathname; // 例: https://crdeckbuilders.com/index.html
  return base + '?deck=' + encodeURIComponent(names.join(','));
}

// ===== SLOT操作：タップでバー表示／スロットタップで移動／左右スライドでも移動 =====
function initSlotScrub() {
  const btn = document.getElementById('slotLoadBtn');
  if (!btn) return;
  let segSlots = [], bar = null, hint = null;
  let barOpen = false, isDown = false, dragging = false;
  let baseIdx = 0, lastIdx = -1, startX = 0, downX = 0, lastPointerX = 0, stepPx = 38;

  function loadSlotByIndex(idx) {
    const s = segSlots[idx]; if (!s) return;
    const cards = (s.slots || []).map(name => CARDS.find(c => c.name === name) || null);
    if (window.CRDeckBridge) window.CRDeckBridge.setDeck(cards, { silent: true });
    currentSlot = s.slot; updateSlotLoadBtn();
    bar && bar.querySelectorAll('.scrub-seg').forEach((e, i) => e.classList.toggle('on', i === idx));
    lastIdx = idx;
  }

  function closeBar() {
    barOpen = false; dragging = false;
    if (bar) { bar.remove(); bar = null; }
    if (hint) { hint.remove(); hint = null; }
  }

  async function openBar() {
    if (!window.CRAuth) { showToast('ログイン機能の読み込み中です'); return; }
    if (!CRAuth.getUser()) { showToast('呼び出しにはログインが必要です'); CRAuth.signIn(); return; }
    let slots = [];
    try { slots = await CRAuth.getSlots(); } catch (e) { showToast('スロットの取得に失敗しました'); return; }
    segSlots = slots.filter(s => (s.slots || []).length > 0); // 保存済み（空きでない）スロットだけ
    if (!segSlots.length) { showToast('保存済みデッキがありません'); return; }
    baseIdx = segSlots.findIndex(s => s.slot === currentSlot);
    if (baseIdx < 0) baseIdx = 0;
    lastIdx = baseIdx; startX = downX;

    bar = document.createElement('div');
    bar.className = 'scrub-bar';
    bar.innerHTML = segSlots.map((s, i) =>
      `<div class="scrub-seg${i === baseIdx ? ' on' : ''}" data-i="${i}"><span class="sn">${s.slot}</span><span class="snm">${s.name || ''}</span></div>`
    ).join('');
    // 各スロットはタップでも移動できる
    bar.querySelectorAll('.scrub-seg').forEach(seg => {
      seg.addEventListener('click', () => { loadSlotByIndex(+seg.dataset.i); closeBar(); });
    });
    hint = document.createElement('div');
    hint.className = 'scrub-hint';
    hint.textContent = '指を離さず左右になぞってデッキ切替';
    document.body.appendChild(bar);
    document.body.appendChild(hint);
    const r = btn.getBoundingClientRect();
    const barH = bar.offsetHeight || 62;
    const seg0 = bar.querySelector('.scrub-seg');
    stepPx = seg0 ? Math.round((seg0.offsetWidth + 8) * 0.7) : 38;
    bar.style.left = Math.round(r.left + r.width / 2) + 'px';
    bar.style.bottom = Math.round(window.innerHeight - r.top + 8) + 'px';
    hint.style.left = Math.round(r.left + r.width / 2) + 'px';
    hint.style.bottom = Math.round(window.innerHeight - r.top + 8 + barH + 6) + 'px';
    barOpen = true;
  }

  const updateScrub = (clientX) => {
    if (!barOpen || !bar) return;
    const step = Math.round((clientX - startX) / stepPx);
    let idx = Math.max(0, Math.min(segSlots.length - 1, baseIdx + step));
    if (idx === lastIdx) return;
    loadSlotByIndex(idx);
  };

  btn.addEventListener('pointerdown', (e) => {
    if (barOpen) { closeBar(); return; } // 開いてたら閉じる（トグル）
    isDown = true; dragging = false;
    lastPointerX = downX = e.clientX;
    openBar();
  });
  document.addEventListener('pointermove', (e) => {
    lastPointerX = e.clientX;
    if (!isDown) return;
    if (!dragging && Math.abs(e.clientX - downX) > 6) dragging = true;
    if (dragging && barOpen) { e.preventDefault(); updateScrub(e.clientX); }
  }, { passive: false });
  document.addEventListener('pointerup', () => {
    if (!isDown) return;
    isDown = false;
    if (dragging) closeBar();   // スライドして離したら確定して閉じる
    // タップ（動かさず）の場合はバーを開いたまま（スロットをタップ or 外側タップで閉じる）
  });
  // バーの外をタップしたら閉じる（SLOTボタン自身は上のtoggleで処理）
  document.addEventListener('pointerdown', (e) => {
    if (barOpen && !e.target.closest('.scrub-bar') && !e.target.closest('#slotLoadBtn')) closeBar();
  });
  document.addEventListener('pointercancel', () => { isDown = false; if (dragging) closeBar(); });
}

// デッキ名入力（プレースホルダ表示・打つと消える）。OK=文字列 / キャンセル=null
function promptDeckName(placeholder) {
  return new Promise(resolve => {
    const ov = document.createElement('div');
    ov.className = 'swap-overlay';
    ov.innerHTML = `<div class="swap-box">
      <div class="swap-title">デッキ名を入力</div>
      <input id="deckNameInput" type="text" placeholder="${placeholder}"
        style="width:100%;margin:12px 0;padding:11px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:16px;outline:none">
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost" id="dnCancel" style="flex:1">キャンセル</button>
        <button class="btn btn-primary" id="dnOk" style="flex:1">保存</button>
      </div>
    </div>`;
    const close = (val) => { ov.remove(); resolve(val); };
    ov.onclick = (e) => { if (e.target === ov) close(null); };
    ov.querySelector('#dnCancel').onclick = () => close(null);
    const inp = ov.querySelector('#deckNameInput');
    ov.querySelector('#dnOk').onclick = () => close(inp.value.trim());
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') close(inp.value.trim()); });
    document.body.appendChild(ov);
    setTimeout(() => inp.focus(), 30);
  });
}

// URLパラメータ ?deck=カード名,カード名,... でデッキを読み込む（攻略ページからのワンタップ用）
function loadDeckFromQuery() {
  const p = new URLSearchParams(location.search).get('deck');
  if (!p) return;
  const names = p.split(',').map(s => s.trim()).filter(Boolean);
  // 順番＝スロット位置（0=進化, 1=ヒーロー/チャンピオン, 2=ワイルド, 3-7=通常）でそのまま配置。
  // 攻略ページ側でスロット順に並べてあるので、ズレずに意図どおりの枠に入る。
  const next = [null,null,null,null,null,null,null,null];
  let placed = 0;
  names.slice(0,8).forEach((n, i) => {
    const c = CARDS.find(x => x.name === n);
    if (c) { next[i] = c; placed++; }
  });
  if (!placed) return;
  deck = next;
  renderDeck(); render();
  showToast('デッキを読み込みました');
}
loadDeckFromQuery();

// フッターの署名を指でなぞる/マウスで触ると少しキラキラ
(function initSignatureSparkle() {
  const name = document.querySelector('.footer-signature .creator-name');
  if (!name) return;
  let last = 0;
  function spawn(x, y) {
    const now = Date.now();
    if (now - last < 45) return; // 出しすぎ防止
    last = now;
    const s = document.createElement('div');
    s.className = 'sig-sparkle';
    s.style.left = (x + (Math.random() * 16 - 8)) + 'px';
    s.style.top  = (y + (Math.random() * 10 - 5)) + 'px';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 700);
  }
  function on()  { name.classList.add('glow'); }
  function off() { setTimeout(() => name.classList.remove('glow'), 400); }
  name.addEventListener('touchstart', on, { passive: true });
  name.addEventListener('touchmove', e => {
    const t = e.touches[0];
    if (t) spawn(t.clientX, t.clientY);
  }, { passive: true });
  name.addEventListener('touchend', off, { passive: true });
  name.addEventListener('touchcancel', off, { passive: true });
  name.addEventListener('mousemove', e => { on(); spawn(e.clientX, e.clientY); });
  name.addEventListener('mouseleave', off);
})();
