<header>
  <a class="logo" href="index.html"><img class="logo-icon" src="icon-192.png" alt="CR Deck Builders ロゴ" width="192" height="192"><div class="logo-text">CR Deck Builders<span>クラロワデッキ作成・診断ツール</span></div></a>
</header>

<div class="app">
  <!-- RIGHT: deck (モバイルでは上に表示) -->
  <div class="right">
    <div class="deck-header">
      <div class="deck-title">デッキ <span class="deck-count" id="deckCount">0/8</span></div>
      <div class="avg-row">
        <span class="avg-label">平均コスト</span>
        <span class="avg-val" id="avgVal">—</span>
        <span class="avg-trend" id="avgTrend"></span>
        <span class="avg-sub" id="avgSub"></span>
      </div>
      <nav class="nav-icons deck-nav">
        <a class="nav-icon active" href="index.html" title="デッキ作成"><span class="nav-emoji">🛠️</span></a>
        <a class="nav-icon" href="decks.html" title="人気デッキ・デッキ探求"><span class="nav-emoji">🏆</span></a>
        <a class="nav-icon" href="support.html" title="支援・寄付"><span class="nav-emoji">💛</span></a>
        <a class="nav-icon" href="contact.html" title="リクエスト・お問い合わせ"><span class="nav-emoji">✉️</span></a>
      </nav>
      <div class="cost-bar" id="costBar"></div>
      <div class="energy-bar-wrap" id="energyBarWrap" style="display:none">
        <div class="energy-bar" id="energyBar"></div>
      </div>
    </div>
    <div class="deck-slots" id="deckSlots"></div>
    <a class="empty-deck-cta" id="emptyDeckCta" href="decks.html">
      <span class="edc-emoji">🏆</span><span>人気デッキから作る</span><span class="edc-arrow">→</span>
    </a>
    <div class="deck-actions">
      <div class="da-left">
        <button class="btn btn-ghost" id="clearBtn">クリア</button>
        <button class="btn btn-primary" id="saveBtn">保存</button>
      </div>
      <button class="slot-load-btn" id="slotLoadBtn" title="タップで使い方／長押しでスロット切替"><span class="sl-cap">SLOT</span><span id="slotLoadNum">—</span></button>
      <a class="btn btn-analyze" id="analyzeBtn" href="strategy.html" aria-disabled="true">デッキ分析へ →</a>
    </div>
  </div>

  <!-- LEFT: card list -->
  <div class="left">
    <div class="controls">
      <div class="controls-row">
        <div class="search-wrap">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="search" placeholder="カード名か略称で検索..." enterkeyhint="search" autocomplete="off" autocorrect="off" autocapitalize="off">
          <button class="search-clear" id="searchClear" tabindex="-1">✕</button>
        </div>
      </div>
      <div class="controls-row">
        <div class="type-tabs">
          <button class="ttab active" data-type="all">全て</button>
          <button class="ttab" data-type="troop">ユニット</button>
          <button class="ttab" data-type="spell">呪文</button>
          <button class="ttab" data-type="building">建物</button>
          <button class="ttab" data-type="evolved"><span class="t-emoji">⚡</span>限界突破</button>
          <button class="ttab" data-type="hero"><span class="t-emoji">👑</span>ヒーロー</button>
          <button class="ttab" data-type="champion"><span class="t-emoji">🏆</span>チャンピオン</button>
          <button class="ttab" data-type="fav" title="お気に入りを上に表示">
            <svg width="15" height="14" viewBox="0 0 24 22" fill="none" xmlns="http://www.w3.org/2000/svg"><path class="heart-fill heart-stroke" d="M12 20.5C12 20.5 2 13.5 2 7C2 4.2 4.2 2 7 2C9 2 10.8 3.1 12 4.7C13.2 3.1 15 2 17 2C19.8 2 22 4.2 22 7C22 13.5 12 20.5 12 20.5Z" stroke-linejoin="round" stroke-linecap="round"/></svg>
          </button>
        </div>
      </div>
      <div class="controls-row">
        <div class="cost-filters" id="costFilters"></div>
        <div class="count-sort">
          <span class="count-info" id="countInfo"></span>
          <button class="cost-sort-btn" id="costSortBtn" type="button" title="コスト順に並べ替え">コスト</button>
        </div>
      </div>
    </div>
    <div class="card-list" id="cardList"></div>
  </div>
