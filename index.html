<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CR Deck Builder</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e2230;
    --border: rgba(255,255,255,0.07);
    --border-hi: rgba(255,255,255,0.15);
    --text: #e8eaf0;
    --text-muted: #6b7080;
    --text-dim: #3a3f50;
    --accent: #e8a020;
    --accent2: #c0781a;
    --red: #e05050;
    --font-head: 'Rajdhani', sans-serif;
    --font-body: 'Noto Sans JP', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 14px; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: var(--font-head);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
  }
  .logo span { color: var(--text-muted); font-size: 12px; font-family: var(--font-body); font-weight: 400; letter-spacing: 0; display: block; margin-top: -4px; }

  .app {
    display: grid;
    grid-template-columns: 300px 1fr;
    height: calc(100vh - 54px);
    overflow: hidden;
  }

  .left {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .right {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--surface);
    border-right: 1px solid var(--border);
  }

  .controls {
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .controls-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  .search-wrap { position: relative; flex: 1; min-width: 140px; }
  .search-wrap svg { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); opacity: 0.4; pointer-events: none; }
  input[type=text] {
    width: 100%; padding: 7px 10px 7px 30px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-family: var(--font-body);
    font-size: 13px; outline: none; transition: border-color 0.15s;
  }
  input[type=text]:focus { border-color: var(--accent); }

  .type-tabs { display: flex; gap: 2px; }
  .ttab {
    padding: 5px 10px; font-size: 12px; font-family: var(--font-body);
    border: 1px solid var(--border); background: transparent;
    color: var(--text-muted); border-radius: 4px; cursor: pointer; transition: all 0.1s; white-space: nowrap;
  }
  .ttab.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }
  .ttab:hover:not(.active) { border-color: var(--border-hi); color: var(--text); }
  /* お気に入りタブ */
  .ttab[data-type="fav"].active { background: #e05090; border-color: #e05090; color: #fff; }

  .cost-filters { display: flex; gap: 4px; flex-wrap: wrap; }
  .cfbtn {
    width: 28px; height: 28px; border-radius: 50%;
    border: 1px solid var(--border); background: transparent;
    color: var(--text-muted); font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.1s;
  }
  .cfbtn:hover:not(.active) { border-color: var(--border-hi); color: var(--text); }
  .cfbtn.active { color: #000; font-weight: 700; }
  .cfbtn[data-c="1"].active { background:#4caf50; border-color:#4caf50; }
  .cfbtn[data-c="2"].active { background:#26c6a0; border-color:#26c6a0; }
  .cfbtn[data-c="3"].active { background:#3a8ef0; border-color:#3a8ef0; }
  .cfbtn[data-c="4"].active { background:#e8a020; border-color:#e8a020; }
  .cfbtn[data-c="5"].active { background:#8b5cf6; border-color:#8b5cf6; }
  .cfbtn[data-c="6"].active { background:#e05050; border-color:#e05050; }
  .cfbtn[data-c="7"].active { background:#c0781a; border-color:#c0781a; }
  .cfbtn[data-c="8"].active { background:#888; border-color:#888; }
  .cfbtn[data-c="9"].active { background:#e8eaf0; border-color:#e8eaf0; color:#000; }

  .count-info { font-size: 11px; color: var(--text-muted); }

  /* card list */
  .card-list {
    overflow-y: auto; flex: 1; padding: 10px 12px;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 6px; align-content: start;
  }
  .card-list::-webkit-scrollbar { width: 4px; }
  .card-list::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 10px 12px; cursor: pointer;
    transition: all 0.12s; user-select: none; position: relative;
    overflow: hidden; min-height: 90px;
  }
  .card-img {
    position: absolute; right: -4px; bottom: -4px;
    width: 88px; height: 88px;
    object-fit: contain;
    opacity: 0.8;
    pointer-events: none;
    transition: opacity 0.12s;
    filter: saturate(0.6);
  }
  .card:hover .card-img { opacity: 0.9; }
  .card.in-deck .card-img { opacity: 0.85; filter: saturate(1); }
  .card:hover { border-color: var(--border-hi); background: var(--surface2); transform: translateY(-1px); }
  .card.in-deck {
    border-color: var(--border);
    background: var(--surface);
    opacity: 0.45;
    cursor: not-allowed;
    pointer-events: none;
  }
  .card.in-deck .fav-btn { pointer-events: auto; cursor: pointer; }
  .card.in-deck .card-img { filter: saturate(0) brightness(0.7); opacity: 0.4; }

  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 4px; margin-bottom: 4px; }
  .card-name { font-size: 11px; font-weight: 500; color: var(--text); line-height: 1.3; flex: 1; padding-right: 58px; word-break: break-all; }

  .cost-pip {
    width: 20px; height: 20px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0;
  }
  .pip-1{background:#1a3d1a;color:#4caf50;} .pip-2{background:#0d2e28;color:#26c6a0;}
  .pip-3{background:#0d1e3d;color:#3a8ef0;} .pip-4{background:#3d2a00;color:#e8a020;}
  .pip-5{background:#200d3d;color:#8b5cf6;} .pip-6{background:#3d0d0d;color:#e05050;}
  .pip-7{background:#2a1500;color:#c0781a;} .pip-8{background:#1a1a1a;color:#888;}
  .pip-9{background:#1a1a2a;color:#9090d0;}

  .card-bottom { display: flex; align-items: center; justify-content: space-between; }
  .card-role { font-size: 9px; color: var(--text-muted); flex: 1; padding-right: 52px; }

  .type-tag { display: inline-block; font-size: 9px; padding: 1px 5px; border-radius: 3px; margin-bottom: 3px; max-width: calc(100% - 52px); }
  .tag-troop{background:rgba(58,142,240,0.15);color:#3a8ef0;}
  .tag-spell{background:rgba(139,92,246,0.15);color:#8b5cf6;}
  .tag-building{background:rgba(232,160,32,0.15);color:#e8a020;}
  .tag-champion{background:rgba(224,80,80,0.15);color:#e05050;}
  .tag-hero{background:rgba(232,160,32,0.2);color:#e8a020;border:1px solid rgba(232,160,32,0.4);}

  /* ハートボタン — 右上絶対配置・SVGインスタ風 */
  .fav-btn {
    position: absolute; top: 5px; right: 5px;
    background: none; border: none; cursor: pointer;
    padding: 2px; line-height: 1; z-index: 2;
    transition: transform 0.15s;
  }
  .fav-btn:hover { transform: scale(1.15); }
  .fav-btn svg .heart-fill { fill: none; }
  .fav-btn svg .heart-stroke { stroke: rgba(255,255,255,0.35); stroke-width: 1.6; }
  .fav-btn:hover svg .heart-stroke { stroke: rgba(255,255,255,0.65); }
  .fav-btn.active svg .heart-fill { fill: #e8304a; }
  .fav-btn.active svg .heart-stroke { stroke: #e8304a; }

  /* RIGHT PANEL */
  .deck-header { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); }
  .deck-title {
    font-family: var(--font-head); font-size: 18px; font-weight: 700;
    letter-spacing: 1px; color: var(--text); text-transform: uppercase;
    display: flex; align-items: baseline; gap: 8px;
  }
  .deck-count { font-size: 13px; font-weight: 400; color: var(--text-muted); font-family: var(--font-body); }
  .avg-row { display: flex; align-items: baseline; gap: 6px; margin-top: 4px; }
  .avg-label { font-size: 11px; color: var(--text-muted); }
  .avg-val { font-family: var(--font-head); font-size: 28px; font-weight: 700; color: var(--accent); line-height: 1; }
  .avg-sub { font-size: 11px; color: var(--text-muted); }

  .cost-bar { display: flex; gap: 2px; margin-top: 8px; height: 4px; border-radius: 2px; overflow: hidden; }
  .bar-seg { height: 100%; transition: flex 0.3s; }

  .deck-slots {
    overflow-y: auto; padding: 10px 12px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(2, auto);
    gap: 6px;
    align-content: start;
    min-height: 0;
  }
  .slot {
    background: var(--surface2); border: 1px dashed var(--border);
    border-radius: 6px; height: 120px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start;
    padding: 6px 4px 6px; gap: 4px;
    transition: all 0.15s;
    overflow: hidden;
    cursor: default;
  }
  .slot-img-wrap {
    flex: 1; display: flex; align-items: center; justify-content: center;
    width: 100%; min-height: 0;
  }
  .slot-img {
    width: 70px; height: 70px; object-fit: contain;
    opacity: 0.9; pointer-events: none;
    filter: saturate(1);
    transition: opacity 0.12s;
    display: block;
  }
  .slot.filled:hover .slot-img { opacity: 0.25; }
  .slot.filled { border-style: solid; border-color: var(--border-hi); background: var(--surface); cursor: pointer; }
  .slot-info {
    display: flex; align-items: flex-start; gap: 4px;
    width: 100%; flex-shrink: 0;
  }
  .slot-info .cost-pip {
    width: 20px; height: 20px; font-size: 11px; flex-shrink: 0; margin-top: 1px;
  }
  .slot.slot-hero { border-color: #e8a020; background: rgba(232,160,32,0.06); }
  .slot.slot-evolved { border-color: #8b5cf6; background: rgba(139,92,246,0.06); }
  .slot.dragging { opacity: 0.3; border-style: dashed; }
  .slot.drag-over { border-color: #3a8ef0; background: rgba(58,142,240,0.12); transform: scale(1.03); }
  .slot.filled:hover { border-color: var(--red); background: rgba(224,80,80,0.06); }
  .slot-num { display: none; }
  .slot-name {
    font-size: 10px; font-weight: 500;
    line-height: 1.3;
    word-break: break-all;
    position: relative; z-index: 2;
    flex: 1;
  }
  .slot-type { display: none; }
  .slot-empty-text { font-size: 22px; color: var(--text-dim); opacity: 0.25; }

  .deck-actions { padding: 10px 12px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 6px; }
  .btn {
    padding: 8px 12px; border-radius: 6px; font-family: var(--font-body);
    font-size: 12px; cursor: pointer; transition: all 0.12s; border: none;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn-primary { background: var(--accent); color: #000; font-weight: 700; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
  .btn-ghost:hover { border-color: var(--border-hi); color: var(--text); }

  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2); border: 1px solid var(--border-hi);
    color: var(--text); padding: 10px 20px; border-radius: 8px;
    font-size: 13px; opacity: 0; transition: all 0.2s;
    pointer-events: none; z-index: 999; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* MOBILE */
  @media (max-width: 720px) {
    body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; overscroll-behavior-y: none; }
    header { flex-shrink: 0; padding: 8px 12px; }
    .logo { font-size: 17px; }
    .logo span { display: none; }

    .app { display: flex; flex-direction: column; flex: 1; overflow: hidden; height: auto; }

    .right { order: -1; flex-shrink: 0; border-right: none; border-bottom: 1px solid var(--border); overflow: hidden; touch-action: none; }
    .left { flex: 1; overflow: hidden; overscroll-behavior-y: contain; }

    .deck-header { padding: 6px 12px 4px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
    .deck-title { font-size: 13px; flex-shrink: 0; }
    .avg-row { margin-top: 0; flex-shrink: 0; }
    .avg-label { display: none; }
    .avg-val { font-size: 18px; }
    .avg-sub { font-size: 10px; }
    .cost-bar { display: none; }

    .deck-slots {
      display: grid !important;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px; padding: 6px 10px;
      flex-direction: unset !important;
    }
    .slot {
      width: 100%; height: 120px;
      flex-direction: column; align-items: center;
      justify-content: flex-start;
      padding: 6px 4px 6px; gap: 4px;
    }
    .slot-num { display: none; }
    .slot-type { display: none; }
    .slot-empty-text { font-size: 22px; opacity: 0.2; color: var(--text-dim); }
    .slot-img-wrap {
      flex: 1; display: flex; align-items: center; justify-content: center;
      width: 100%; min-height: 0;
    }
    .slot-img {
      position: static; transform: none;
      width: 80px; height: 80px;
      opacity: 0.9; filter: saturate(1);
    }
    .slot-info {
      display: flex; align-items: flex-start; gap: 4px;
      width: 100%; flex-shrink: 0; padding: 0 2px;
    }
    .slot .cost-pip {
      width: 20px; height: 20px; font-size: 11px;
      flex-shrink: 0; margin-top: 1px;
    }
    .slot-name {
      font-size: 9px; font-weight: 500;
      line-height: 1.3; display: block;
      word-break: break-all;
    }

    .deck-actions { padding: 6px 10px; flex-direction: row; gap: 6px; }
    .deck-actions .btn { flex: 1; padding: 7px 8px; font-size: 11px; }

    .controls { padding: 8px 10px; }
    .controls-row { gap: 6px; }
    .type-tabs { gap: 2px; }
    .ttab { padding: 4px 7px; font-size: 11px; }
    .cfbtn { width: 24px; height: 24px; font-size: 11px; }
    .card-list { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 5px; padding: 8px 10px; overscroll-behavior-y: auto; -webkit-overflow-scrolling: touch; }
    .card { padding: 9px 8px 11px; min-height: 82px; }
    .card-name { font-size: 10px; }
    .card-role { font-size: 9px; }
    .cost-pip { width: 18px; height: 18px; font-size: 10px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">CR Deck Builder<span>クラロワ デッキビルダー</span></div>
</header>

<div class="app">
  <!-- RIGHT: deck (モバイルでは上に表示) -->
  <div class="right">
    <div class="deck-header">
      <div class="deck-title">Deck <span class="deck-count" id="deckCount">0/8</span></div>
      <div class="avg-row">
        <span class="avg-label">平均コスト</span>
        <span class="avg-val" id="avgVal">—</span>
        <span class="avg-sub" id="avgSub"></span>
      </div>
      <div class="cost-bar" id="costBar"></div>
    </div>
    <div class="deck-slots" id="deckSlots"></div>
    <div class="deck-actions">
      <button class="btn btn-primary" id="copyBtn">📋 テキストコピー</button>
      <button class="btn btn-ghost" id="clearBtn">クリア</button>
    </div>
  </div>

  <!-- LEFT: card list -->
  <div class="left">
    <div class="controls">
      <div class="controls-row">
        <div class="search-wrap">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="search" placeholder="カード名で検索...">
        </div>
        <div class="type-tabs">
          <button class="ttab active" data-type="all">全て</button>
          <button class="ttab" data-type="troop">ユニット</button>
          <button class="ttab" data-type="spell">呪文</button>
          <button class="ttab" data-type="building">建物</button>
          <button class="ttab" data-type="fav">❤</button>
        </div>
      </div>
      <div class="controls-row">
        <div class="cost-filters" id="costFilters"></div>
        <span class="count-info" id="countInfo"></span>
      </div>
    </div>
    <div class="card-list" id="cardList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// =============================================
// CARD DATA — ここを編集してカードを追加・変更
// 名称はsmashlog正式名称に準拠
// =============================================
const CARDS = [
  // 1コスト
  {name:"スケルトン", evolved:true,           cost:1, type:"troop",    role:"サイクル・防衛", img:"https://raw.githubusercontent.com/RoyaleAPI/cr-api-assets/master/cards/skeletons.png"},
  {name:"アイススピリット",      cost:1, type:"troop",    role:"凍結・サイクル", img:"https://raw.githubusercontent.com/RoyaleAPI/cr-api-assets/master/cards/ice-spirit.png"},
  {name:"ファイアスピリット",    cost:1, type:"troop",    role:"小型処理・対空", img:"https://raw.githubusercontent.com/RoyaleAPI/cr-api-assets/master/cards/fire-spirit.png"},
  {name:"エレクトロスピリット",  cost:1, type:"troop",    role:"チェーン感電・サイクル", img:"https://raw.githubusercontent.com/RoyaleAPI/cr-api-assets/master/cards/electro-spirit.png"},
  {name:"ヒールスピリット",      cost:1, type:"troop",    role:"回復サポート", img:"https://raw.githubusercontent.com/RoyaleAPI/cr-api-assets/master/cards/heal-spirit.png"},

  // 2コスト
  {name:"ゴブリン",              cost:2, type:"troop",    role:"小型高DPS", img:"https://raw.githubusercontent.com/RoyaleAPI/cr-api-assets/master/cards/goblins.png"},
  {name:"ボンバー",              cost:2, type:"troop",    role:"範囲攻撃・防衛", img:"https://raw.githubusercontent.com/RoyaleAPI/cr-api-assets/master/cards/bomber.png"},
  {name:"槍ゴブリン",            cost:2, type:"troop",    role:"対空・遠距離", img:"https://raw.githubusercontent.com/RoyaleAPI/cr-api-assets/master/cards/spear-goblins.png"},
  {name:"コウモリの群れ",        cost:2, type:"troop",    role:"対空・サイクル", img:"https://raw.githubusercontent.com/RoyaleAPI/cr-api-assets/master/cards/bats.png"},
  {name:"アイスゴーレム",        cost:2, type:"troop",    role:"タンク・デス凍結", img:"https://raw.githubusercontent.com/RoyaleAPI/cr-api-assets/master/cards/ice-golem.png"},
  {name:"ウォールブレイカー",    cost:2, type:"troop",    role:"建物狙い・サイクル", img:"https://raw.githubusercontent.com/RoyaleAPI/cr-api-assets/master/cards/wall-breakers.png"},
  {name:"バーサーカー",          cost:2, type:"troop",    role:"高速高DPS近接", img:"https://raw.githubusercontent.com/RoyaleAPI/cr-api-assets/master/cards/berserker.png"},
  {name:"ザップ", evolved:true,                cost:2, type:"spell",    role:"即時感電・リセット", img:"https://raw.githubusercontent.com/RoyaleAPI/cr-api-assets/master/cards/zap.png"},
  {name:"巨大雪玉", evolved:true,              cost:2, type:"spell",    role:"ノックバック・減速", img:"https://raw.githubusercontent.com/RoyaleAPI/cr-api-assets/master/cards/giant-snowball.png"},
  {name:"ローリングバーバリアン", cost:2, type:"spell",    role:"転がし＋バーバリアン", img:"https://raw.githubusercontent.com/RoyaleAPI/cr-api-assets/master/cards/barbarian-barrel.png"},
  {name:"ローリングウッド",      cost:2, type:"spell",    role:"広範囲ローリング", img:"https://raw.githubusercontent.com/RoyaleAPI/cr-api-assets/master/cards/the-log.png"},
  {name:"レイジ",                cost:2, type:"spell",    role:"速度・火力アップ", img:"https://raw.githubusercontent.com/RoyaleAPI/cr-api-assets/master/cards/rage.png"},

  // 3コスト
  {name:"ナイト", evolved:true,                cost:3, type:"troop",    role:"タンク・防衛", img:"https://raw.githubusercontent.com/RoyaleAPI/cr-api-assets/master/cards/knight.png"},

let deck = [null,null,null,null,null,null,null,null];
let favorites = JSON.parse(localStorage.getItem('cr_favorites') || '[]');
let activeType = 'all';
let activeCosts = new Set();

function saveFavorites() {
  try { localStorage.setItem('cr_favorites', JSON.stringify(favorites)); } catch(e) {}
}

function isFav(name) { return favorites.includes(name); }

function toggleFav(name, e) {
  e.stopPropagation();
  if (isFav(name)) { favorites = favorites.filter(f => f !== name); }
  else { favorites.push(name); }
  saveFavorites();
  render();
}

function init() {
  const cf = document.getElementById('costFilters');
  [1,2,3,4,5,6,7,8,9].forEach(c => {
    const b = document.createElement('button');
    b.className = 'cfbtn'; b.dataset.c = c; b.textContent = c; b.title = c + 'コスト';
    b.onclick = () => { b.classList.toggle('active'); activeCosts.has(c) ? activeCosts.delete(c) : activeCosts.add(c); render(); };
    cf.appendChild(b);
  });

  document.querySelectorAll('.ttab').forEach(t => {
    t.onclick = () => {
      document.querySelectorAll('.ttab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      activeType = t.dataset.type;
      render();
    };
  });

  document.getElementById('search').oninput = render;
  document.getElementById('clearBtn').onclick = () => { deck = [null,null,null,null,null,null,null,null]; renderDeck(); render(); };
  document.getElementById('copyBtn').onclick = copyDeck;

  render();
  renderDeck();
  initTouchDnD();
}

// ひらがな→カタカナ変換（検索用）
function toKatakana(str) {
  return str.replace(/[ぁ-ゖ]/g, ch => String.fromCharCode(ch.charCodeAt(0) + 0x60));
}

function getFiltered() {
  const raw = document.getElementById('search').value;
  const q = toKatakana(raw.toLowerCase());
  return CARDS.filter(c => {
    if (activeType === 'fav' && !isFav(c.name)) return false;
    if (activeType !== 'all' && activeType !== 'fav' && c.type !== activeType) return false;
    if (activeCosts.size > 0 && !activeCosts.has(c.cost)) return false;
    if (q && !toKatakana(c.name.toLowerCase()).includes(q)) return false;
    return true;
  });
}

function render() {
  const filtered = getFiltered();
  document.getElementById('countInfo').textContent = filtered.length + ' / ' + CARDS.length + ' 枚';
  const list = document.getElementById('cardList');
  list.innerHTML = '';
  filtered.forEach(c => {
    const inDeck = deck.some(d => d && d.name === c.name);
    const faved = isFav(c.name);
    const div = document.createElement('div');
    div.className = 'card' + (inDeck ? ' in-deck' : '');
    const tagClass = c.hero ? 'tag-hero' : 'tag-' + c.type;
    const tagText = c.hero ? 'ヒーロー' : c.type === 'troop' ? 'ユニット' : c.type === 'spell' ? '呪文' : '建物';
    const heartSvg = `<svg width="20" height="19" viewBox="0 0 24 22" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path class="heart-fill heart-stroke" d="M12 20.5C12 20.5 2 13.5 2 7C2 4.2 4.2 2 7 2C9 2 10.8 3.1 12 4.7C13.2 3.1 15 2 17 2C19.8 2 22 4.2 22 7C22 13.5 12 20.5 12 20.5Z" stroke-linejoin="round" stroke-linecap="round"/>
    </svg>`;
    const imgHtml = c.img ? `<img class="card-img" src="${c.img}" alt="" loading="lazy">` : '';
    div.innerHTML = `
      ${imgHtml}
      <button class="fav-btn ${faved ? 'active' : ''}" title="${faved ? 'お気に入り解除' : 'お気に入り追加'}" onclick="toggleFav('${c.name}', event)">${heartSvg}</button>
      <div class="card-top">
        <div class="cost-pip pip-${Math.min(c.cost,9)}">${c.cost}</div>
        <div class="card-name">${c.name}</div>
      </div>
      <span class="type-tag ${tagClass}">${tagText}</span>
      <div class="card-bottom">
        <div class="card-role">${c.role}</div>
      </div>`;
    div.draggable = true;
    div.addEventListener('dragstart', e => {
      if (deck.some(d => d && d.name === c.name)) { e.preventDefault(); return; }
      dragSrcCard = c;
      dragSrcIdx = null;
      div.style.opacity = '0.4';
      e.dataTransfer.effectAllowed = 'move';
    });
    div.addEventListener('dragend', e => { div.style.opacity = ''; dragSrcCard = null; });
    div.onclick = () => toggleDeck(c);
    list.appendChild(div);
  });
}

function addToDeck(card) {
  if (deck.some(d => d && d.name === card.name)) return;
  const emptyIdx = deck.indexOf(null);
  if (emptyIdx === -1) { showToast('⚠ デッキは8枚まで'); return; }
  if (card.hero && deck.filter(d => d && d.hero).length >= 2) { showToast('⚠ ヒーロー/チャンピオンは2枚まで'); return; }
  if (card.evolved && deck.filter(d => d && d.evolved && d.name === card.name).length >= 1) { showToast('⚠ 同じカードの限界突破は1枚まで'); return; }
  deck[emptyIdx] = card;
  renderDeck(); render();
}

function removeFromDeck(card) {
  const idx = deck.findIndex(d => d && d.name === card.name);
  if (idx >= 0) { deck[idx] = null; renderDeck(); render(); }
}


let dragSrcIdx = null;
let dragSrcCard = null;

function onDragStart(e) {
  dragSrcIdx = parseInt(this.dataset.idx);
  dragSrcCard = null;
  this.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function onDragEnd(e) {
  document.querySelectorAll('.slot').forEach(s => {
    s.classList.remove('dragging', 'drag-over');
  });
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  this.classList.add('drag-over');
}

function onDragLeave(e) {
  this.classList.remove('drag-over');
}

function onDrop(e) {
  e.preventDefault();
  this.classList.remove('drag-over');
  const destIdx = parseInt(this.dataset.idx);
  if (dragSrcCard) {
    // カード選択ゾーンからドロップ
    const c = dragSrcCard;
    dragSrcCard = null;
    if (deck.some(d => d && d.name === c.name)) { showToast('⚠ すでに追加済み'); return; }
    if (c.hero && deck.filter(d => d && d.hero).length >= 2) { showToast('⚠ ヒーロー/チャンピオンは2枚まで'); return; }
    deck[destIdx] = c;
    renderDeck(); render();
  } else if (dragSrcIdx !== null && dragSrcIdx !== destIdx) {
    // スロット間の入れ替え
    const tmp = deck[destIdx];
    deck[destIdx] = deck[dragSrcIdx];
    deck[dragSrcIdx] = tmp;
    dragSrcIdx = null;
    renderDeck(); render();
  }
}


// タッチD&D（モバイル・デッキスロット専用）
let touchSrcIdx = null;
let touchClone = null;
let touchSrcCard = null;
let touchOffsetX = 0;
let touchOffsetY = 0;

function createGhost(imgSrc, name, cost, size) {
  const ghost = document.createElement('div');
  ghost.style.cssText = [
    'position:fixed',
    'pointer-events:none',
    'z-index:9999',
    'width:' + size + 'px',
    'height:' + size + 'px',
    'border-radius:10px',
    'background:#1e2230',
    'border:2px solid rgba(58,142,240,0.8)',
    'display:flex',
    'flex-direction:column',
    'align-items:center',
    'justify-content:center',
    'gap:4px',
    'opacity:0.85',
    'box-shadow:0 4px 20px rgba(0,0,0,0.5)',
  ].join(';');
  if (imgSrc) {
    const img = document.createElement('img');
    img.src = imgSrc;
    img.style.cssText = 'width:60%;height:60%;object-fit:contain;';
    ghost.appendChild(img);
  }
  const label = document.createElement('div');
  label.textContent = name;
  label.style.cssText = 'font-size:9px;color:#e8eaf0;text-align:center;padding:0 4px;line-height:1.2;font-family:sans-serif;';
  ghost.appendChild(label);
  document.body.appendChild(ghost);
  return ghost;
}

function moveGhost(ghost, x, y) {
  const w = ghost.offsetWidth;
  const h = ghost.offsetHeight;
  ghost.style.left = (x - w/2) + 'px';
  ghost.style.top  = (y - h/2 - 20) + 'px';
}

let longPressTimer = null;
let touchStartX = 0;
let touchStartY = 0;
const LONG_PRESS_MS = 300;
const DRAG_THRESHOLD = 8;
let isDragging = false;

function startDrag(srcCard, srcIdx, imgSrc, name, cost, x, y, srcEl) {
  isDragging = true;
  touchSrcCard = srcCard;
  touchSrcIdx = srcIdx;
  // ゴーストを作成して body に追加してから位置を設定
  touchClone = createGhost(imgSrc, name, cost, 90);
  // 次フレームで offsetWidth が確定してから位置設定
  requestAnimationFrame(() => {
    moveGhost(touchClone, x, y);
  });
  if (srcEl) srcEl.style.opacity = '0.3';
}

function cancelDrag() {
  clearTimeout(longPressTimer);
  longPressTimer = null;
  isDragging = false;
  touchSrcCard = null;
  touchSrcIdx = null;
  if (touchClone) { touchClone.remove(); touchClone = null; }
  document.querySelectorAll('.slot').forEach(s => { s.classList.remove('drag-over'); s.style.opacity = ''; });
  document.querySelectorAll('.card').forEach(c => { c.style.opacity = ''; });
}

function initTouchDnD() {
  // カード選択ゾーン
  document.getElementById('cardList').addEventListener('touchstart', e => {
    const card = e.target.closest('.card');
    if (!card || card.classList.contains('in-deck')) return;
    const cardName = card.querySelector('.card-name').textContent.trim();
    const srcCard = CARDS.find(c => c.name === cardName);
    if (!srcCard) return;
    const t = e.touches[0];
    touchStartX = t.clientX; touchStartY = t.clientY;
    longPressTimer = setTimeout(() => {
      startDrag(srcCard, null, srcCard.img, srcCard.name, srcCard.cost, touchStartX, touchStartY, card);
    }, LONG_PRESS_MS);
  }, {passive:true});

  // デッキスロット
  document.getElementById('deckSlots').addEventListener('touchstart', e => {
    const slot = e.target.closest('.slot.filled');
    if (!slot) return;
    const idx = parseInt(slot.dataset.idx);
    const c = deck[idx];
    if (!c) return;
    const t = e.touches[0];
    touchStartX = t.clientX; touchStartY = t.clientY;
    longPressTimer = setTimeout(() => {
      startDrag(null, idx, c.img, c.name, c.cost, touchStartX, touchStartY, slot);
    }, LONG_PRESS_MS);
  }, {passive:true});

  document.addEventListener('touchmove', e => {
    const t = e.touches[0];
    // 長押し前に大きく動いたらキャンセル（スクロール優先）
    if (!isDragging) {
      const dx = Math.abs(t.clientX - touchStartX);
      const dy = Math.abs(t.clientY - touchStartY);
      if (dx > DRAG_THRESHOLD || dy > DRAG_THRESHOLD) {
        clearTimeout(longPressTimer);
        longPressTimer = null;
      }
      return;
    }
    e.preventDefault();
    if (touchClone) moveGhost(touchClone, t.clientX, t.clientY);
    document.querySelectorAll('.slot').forEach(s => s.classList.remove('drag-over'));
    const el = document.elementFromPoint(t.clientX, t.clientY);
    const target = el && el.closest('.slot');
    if (target) target.classList.add('drag-over');
  }, {passive:false});

  document.addEventListener('touchend', e => {
    clearTimeout(longPressTimer);
    longPressTimer = null;
    if (!isDragging) return;
    const t = e.changedTouches[0];
    if (touchClone) { touchClone.remove(); touchClone = null; }
    document.querySelectorAll('.slot').forEach(s => { s.classList.remove('drag-over'); s.style.opacity = ''; });
    document.querySelectorAll('.card').forEach(c => { c.style.opacity = ''; });
    const el = document.elementFromPoint(t.clientX, t.clientY);
    const target = el && el.closest('.slot');
    if (target) {
      const destIdx = parseInt(target.dataset.idx);
      if (touchSrcCard) {
        const c = touchSrcCard;
        if (deck.some(d => d && d.name === c.name)) { showToast('⚠ すでに追加済み'); }
        else if (c.hero && deck.filter(d => d && d.hero).length >= 2) { showToast('⚠ ヒーロー/チャンピオンは2枚まで'); }
        else { deck[destIdx] = c; renderDeck(); render(); }
      } else if (touchSrcIdx !== null && destIdx !== touchSrcIdx) {
        const tmp = deck[destIdx];
        deck[destIdx] = deck[touchSrcIdx];
        deck[touchSrcIdx] = tmp;
        renderDeck(); render();
      }
    }
    isDragging = false;
    touchSrcCard = null;
    touchSrcIdx = null;
  }, {passive:true});

  document.addEventListener('touchcancel', cancelDrag, {passive:true});
}
function toggleDeck(card) { addToDeck(card); }

const COST_COLORS = {1:'#4caf50',2:'#26c6a0',3:'#3a8ef0',4:'#e8a020',5:'#8b5cf6',6:'#e05050',7:'#c0781a',8:'#888',9:'#9090d0'};

function renderDeck() {
  const slots = document.getElementById('deckSlots');
  slots.innerHTML = '';
  for (let i = 0; i < 8; i++) {
    const div = document.createElement('div');
    const c = deck[i];
    if (c) {
      div.className = 'slot filled' + (c.hero ? ' slot-hero' : c.evolved ? ' slot-evolved' : '');
      div.title = 'クリックで外す';
      div.draggable = true;
      div.dataset.idx = i;
      const slotImg = c.img
        ? `<div class="slot-img-wrap"><img class="slot-img" src="${c.img}" alt="" loading="lazy"></div>`
        : `<div class="slot-img-wrap"></div>`;
      div.innerHTML = `${slotImg}
        <div class="slot-info">
          <div class="cost-pip pip-${Math.min(c.cost,9)}">${c.cost}</div>
          <span class="slot-name">${c.name}</span>
        </div>`;
      div.onclick = () => removeFromDeck(c);
      div.addEventListener('dragstart', onDragStart);
      div.addEventListener('dragend',   onDragEnd);
      div.addEventListener('dragover',  onDragOver);
      div.addEventListener('dragleave', onDragLeave);
      div.addEventListener('drop',      onDrop);
    } else {
      div.className = 'slot';
      div.dataset.idx = i;
      div.innerHTML = `<span class="slot-empty-text">+</span>`;
      div.addEventListener('dragover',  onDragOver);
      div.addEventListener('dragleave', onDragLeave);
      div.addEventListener('drop',      onDrop);
    }
    slots.appendChild(div);
  }

  document.getElementById('deckCount').textContent = deck.filter(d=>d).length + '/8';
  if (deck.filter(d=>d).length > 0) {
    const filled = deck.filter(d => d);
    const avg = (filled.reduce((s,c) => s+c.cost, 0) / filled.length);
    document.getElementById('avgVal').textContent = avg.toFixed(2);
    const cnt = deck.filter(d=>d).length;
    document.getElementById('avgSub').textContent = cnt < 8 ? '（' + cnt + '枚）' : '';
  } else {
    document.getElementById('avgVal').textContent = '—';
    document.getElementById('avgSub').textContent = '';
  }

  const bar = document.getElementById('costBar');
  bar.innerHTML = '';
  if (deck.filter(d=>d).length > 0) {
    const counts = {};
    deck.filter(d=>d).forEach(c => counts[c.cost] = (counts[c.cost]||0) + 1);
    Object.entries(counts).sort((a,b) => +a[0]-+b[0]).forEach(([cost, cnt]) => {
      const seg = document.createElement('div');
      seg.className = 'bar-seg'; seg.style.flex = cnt;
      seg.style.background = COST_COLORS[cost] || '#888';
      seg.title = cost + 'コスト × ' + cnt;
      bar.appendChild(seg);
    });
  }
}

function copyDeck() {
  if (deck.length === 0) { showToast('デッキが空です'); return; }
  const sorted = [...deck];
  const avg = (deck.reduce((s,c) => s+c.cost, 0) / deck.length).toFixed(2);
  const text = '【クラロワ デッキ】平均コスト ' + avg + '\n' +
    sorted.map((c,i) => (i+1) + '. ' + c.name + '（' + c.cost + 'コス）').join('\n');
  navigator.clipboard.writeText(text).then(() => showToast('📋 コピーしました！'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

init();
</script>
