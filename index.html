<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CR Deck Builder</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e2230;
    --border: rgba(255,255,255,0.07);
    --border-hi: rgba(255,255,255,0.15);
    --text: #e8eaf0;
    --text-muted: #6b7080;
    --text-dim: #3a3f50;
    --accent: #e8a020;
    --accent2: #c0781a;
    --blue: #3a8ef0;
    --green: #2eb87a;
    --red: #e05050;
    --purple: #8b5cf6;
    --font-head: 'Rajdhani', sans-serif;
    --font-body: 'Noto Sans JP', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 14px; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: var(--font-head);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
  }
  .logo span { color: var(--text-muted); font-size: 12px; font-family: var(--font-body); font-weight: 400; letter-spacing: 0; display: block; margin-top: -4px; }

  /* ── LAYOUT ── */
  .app {
    display: grid;
    grid-template-columns: 300px 1fr;
    height: calc(100vh - 54px);
    overflow: hidden;
  }

  /* ── LEFT PANEL ── */
  .left {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── MOBILE ── */
  @media (max-width: 720px) {
    body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    header { flex-shrink: 0; padding: 8px 12px; }
    .logo { font-size: 17px; }
    .logo span { display: none; }

    .app {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
      height: auto;
    }

    /* デッキを上に */
    .right {
      order: -1;
      flex-shrink: 0;
      border-right: none;
      border-bottom: 1px solid var(--border);
    }
    .left {
      flex: 1;
      overflow: hidden;
      border-right: none;
    }

    /* モバイル用デッキヘッダー: コンパクト */
    .deck-header { padding: 8px 12px 6px; }
    .deck-title { font-size: 14px; }
    .avg-val { font-size: 20px; }
    .avg-row { margin-top: 2px; }

    /* デッキスロット: 横並びグリッド */
    .deck-slots {
      flex-direction: row !important;
      flex-wrap: wrap;
      gap: 4px;
      padding: 6px 10px;
      max-height: none;
      overflow: visible;
    }
    .slot {
      width: calc(25% - 3px);
      height: 52px;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4px 2px;
      gap: 2px;
    }
    .slot-num { display: none; }
    .slot-name { font-size: 10px; text-align: center; line-height: 1.2; }
    .slot-type { font-size: 8px; }
    .slot-empty-text { font-size: 10px; }
    .slot .cost-pip { width: 16px; height: 16px; font-size: 9px; }

    /* デッキアクション */
    .deck-actions { padding: 6px 10px; flex-direction: row; gap: 6px; }
    .deck-actions .btn { flex: 1; padding: 7px 8px; font-size: 11px; }

    /* カードリスト */
    .controls { padding: 8px 10px; }
    .controls-row { gap: 6px; }
    .type-tabs { gap: 2px; }
    .ttab { padding: 4px 8px; font-size: 11px; }
    .cfbtn { width: 24px; height: 24px; font-size: 11px; }
    .card-list {
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 5px;
      padding: 8px 10px;
    }
    .card { padding: 6px 8px; }
    .card-name { font-size: 11px; }
    .card-role { font-size: 9px; }
    .cost-pip { width: 18px; height: 18px; font-size: 10px; }
  }
  .controls {
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .controls-row {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 140px;
  }
  .search-wrap svg {
    position: absolute;
    left: 8px; top: 50%;
    transform: translateY(-50%);
    opacity: 0.4;
    pointer-events: none;
  }
  input[type=text] {
    width: 100%;
    padding: 7px 10px 7px 30px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type=text]:focus { border-color: var(--accent); }

  /* type tabs */
  .type-tabs { display: flex; gap: 2px; }
  .ttab {
    padding: 5px 10px;
    font-size: 12px;
    font-family: var(--font-body);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.1s;
    white-space: nowrap;
  }
  .ttab.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }
  .ttab:hover:not(.active) { border-color: var(--border-hi); color: var(--text); }

  /* cost filters */
  .cost-filters { display: flex; gap: 4px; flex-wrap: wrap; }
  .cfbtn {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.1s;
  }
  .cfbtn:hover:not(.active) { border-color: var(--border-hi); color: var(--text); }
  .cfbtn.active { color: #000; font-weight: 700; }
  .cfbtn[data-c="1"].active { background:#4caf50; border-color:#4caf50; }
  .cfbtn[data-c="2"].active { background:#26c6a0; border-color:#26c6a0; }
  .cfbtn[data-c="3"].active { background:#3a8ef0; border-color:#3a8ef0; }
  .cfbtn[data-c="4"].active { background:#e8a020; border-color:#e8a020; }
  .cfbtn[data-c="5"].active { background:#8b5cf6; border-color:#8b5cf6; }
  .cfbtn[data-c="6"].active { background:#e05050; border-color:#e05050; }
  .cfbtn[data-c="7"].active { background:#c0781a; border-color:#c0781a; }
  .cfbtn[data-c="8"].active { background:#888; border-color:#888; }
  .cfbtn[data-c="9"].active { background:#e8eaf0; border-color:#e8eaf0; }

  .count-info { font-size: 11px; color: var(--text-muted); }

  /* card list */
  .card-list {
    overflow-y: auto;
    flex: 1;
    padding: 12px 16px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 6px;
    align-content: start;
  }
  .card-list::-webkit-scrollbar { width: 4px; }
  .card-list::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    cursor: pointer;
    transition: all 0.12s;
    user-select: none;
  }
  .card:hover { border-color: var(--border-hi); background: var(--surface2); transform: translateY(-1px); }
  .card.in-deck { border-color: var(--accent); background: rgba(232,160,32,0.08); }
  .card.in-deck:hover { border-color: var(--red); background: rgba(224,80,80,0.08); }

  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 4px; margin-bottom: 5px; }
  .card-name { font-size: 12px; font-weight: 500; color: var(--text); line-height: 1.3; }
  .cost-pip {
    min-width: 20px; height: 20px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
    flex-shrink: 0;
  }
  .pip-1 { background:#1a3d1a; color:#4caf50; }
  .pip-2 { background:#0d2e28; color:#26c6a0; }
  .pip-3 { background:#0d1e3d; color:#3a8ef0; }
  .pip-4 { background:#3d2a00; color:#e8a020; }
  .pip-5 { background:#200d3d; color:#8b5cf6; }
  .pip-6 { background:#3d0d0d; color:#e05050; }
  .pip-7 { background:#2a1500; color:#c0781a; }
  .pip-8 { background:#1a1a1a; color:#888; }
  .pip-9 { background:#1a1a2a; color:#9090d0; }

  .card-role { font-size: 10px; color: var(--text-muted); }
  .type-tag {
    display: inline-block;
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 3px;
    margin-bottom: 3px;
  }
  .tag-troop { background: rgba(58,142,240,0.15); color: #3a8ef0; }
  .tag-spell { background: rgba(139,92,246,0.15); color: #8b5cf6; }
  .tag-building { background: rgba(232,160,32,0.15); color: #e8a020; }
  .tag-champion { background: rgba(224,80,80,0.15); color: #e05050; }

  /* ── RIGHT PANEL ── */
  .right {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--surface);
    border-right: 1px solid var(--border);
  }
  .deck-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
  }
  .deck-title {
    font-family: var(--font-head);
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--text);
    text-transform: uppercase;
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .deck-count { font-size: 13px; font-weight: 400; color: var(--text-muted); font-family: var(--font-body); }
  .avg-row {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin-top: 4px;
  }
  .avg-label { font-size: 11px; color: var(--text-muted); }
  .avg-val { font-family: var(--font-head); font-size: 28px; font-weight: 700; color: var(--accent); line-height: 1; }
  .avg-sub { font-size: 11px; color: var(--text-muted); }

  /* cost bar */
  .cost-bar { display: flex; gap: 2px; margin-top: 8px; height: 4px; border-radius: 2px; overflow: hidden; }
  .bar-seg { height: 100%; transition: flex 0.3s; }

  /* slots */
  .deck-slots {
    flex: 1;
    overflow-y: auto;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-height: 0;
  }
  .slot {
    background: var(--surface2);
    border: 1px dashed var(--border);
    border-radius: 6px;
    height: 44px;
    display: flex;
    align-items: center;
    padding: 0 10px;
    gap: 8px;
    transition: all 0.15s;
  }
  .slot.filled {
    border-style: solid;
    border-color: var(--border-hi);
    background: var(--surface);
    cursor: pointer;
  }
  .slot.filled:hover { border-color: var(--red); background: rgba(224,80,80,0.06); }
  .slot-num { font-size: 10px; color: var(--text-dim); width: 14px; flex-shrink: 0; }
  .slot-name { font-size: 13px; font-weight: 500; flex: 1; }
  .slot-cost { font-size: 12px; font-weight: 700; }
  .slot-type { font-size: 9px; }
  .slot-empty-text { font-size: 12px; color: var(--text-dim); }

  /* deck actions */
  .deck-actions {
    padding: 10px 12px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .btn {
    padding: 8px 12px;
    border-radius: 6px;
    font-family: var(--font-body);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.12s;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .btn-primary { background: var(--accent); color: #000; font-weight: 700; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
  .btn-ghost:hover { border-color: var(--border-hi); color: var(--text); }

  /* cost coloring helpers */
  .c1 { color:#4caf50; } .c2 { color:#26c6a0; } .c3 { color:#3a8ef0; }
  .c4 { color:#e8a020; } .c5 { color:#8b5cf6; } .c6 { color:#e05050; }
  .c7 { color:#c0781a; } .c8 { color:#888; }   .c9 { color:#9090d0; }

  /* toast */
  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border-hi);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 13px;
    opacity: 0;
    transition: all 0.2s;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>

<header>
  <div class="logo">CR Deck Builder<span>クラロワ デッキビルダー</span></div>
</header>

<div class="app">
  <!-- RIGHT: deck (モバイルでは上に表示) -->
  <div class="right">
    <div class="deck-header">
      <div class="deck-title">Deck <span class="deck-count" id="deckCount">0/8</span></div>
      <div class="avg-row">
        <span class="avg-label">平均コスト</span>

      </div>
      <div class="cost-bar" id="costBar"></div>
    </div>
    <div class="deck-slots" id="deckSlots"></div>
    <div class="deck-actions">
      <button class="btn btn-primary" id="copyBtn">📋 デッキをテキストでコピー</button>
      <button class="btn btn-ghost" id="clearBtn">クリア</button>
    </div>
  </div>

  <!-- LEFT: card list -->
  <div class="left">
    <div class="controls">
      <div class="controls-row">
        <div class="search-wrap">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="search" placeholder="カード名で検索...">
        </div>
        <div class="type-tabs">
          <button class="ttab active" data-type="all">全て</button>
          <button class="ttab" data-type="troop">トループ</button>
          <button class="ttab" data-type="spell">スペル</button>
          <button class="ttab" data-type="building">建物</button>
        </div>
      </div>
      <div class="controls-row">
        <div class="cost-filters" id="costFilters"></div>
        <span class="count-info" id="countInfo"></span>
      </div>
    </div>
    <div class="card-list" id="cardList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

let deck = [];
let activeType = 'all';
let activeCosts = new Set();

function init() {
  // cost filter buttons
  const cf = document.getElementById('costFilters');
  [1,2,3,4,5,6,7,8,9].forEach(c => {
    const b = document.createElement('button');
    b.className = 'cfbtn';
    b.dataset.c = c;
    b.textContent = c;
    b.title = c + 'コスト';
    b.onclick = () => {
      b.classList.toggle('active');
      activeCosts.has(c) ? activeCosts.delete(c) : activeCosts.add(c);
      render();
    };
    cf.appendChild(b);
  });

  // type tabs
  document.querySelectorAll('.ttab').forEach(t => {
    t.onclick = () => {
      document.querySelectorAll('.ttab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      activeType = t.dataset.type;
      render();
    };
  });

  // search
  document.getElementById('search').oninput = render;

  // deck actions
  document.getElementById('clearBtn').onclick = () => { deck = []; renderDeck(); render(); };
  document.getElementById('copyBtn').onclick = copyDeck;

  render();
  renderDeck();
}

function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase();
  return CARDS.filter(c => {
    if (activeType !== 'all' && c.type !== activeType) return false;
    if (activeCosts.size > 0 && !activeCosts.has(c.cost)) return false;
    if (q && !c.name.toLowerCase().includes(q)) return false;
    return true;
  });
}

function render() {
  const filtered = getFiltered();
  document.getElementById('countInfo').textContent = filtered.length + ' / ' + CARDS.length + ' 枚';
  const list = document.getElementById('cardList');
  list.innerHTML = '';
  filtered.forEach(c => {
    const inDeck = deck.some(d => d.name === c.name);
    const div = document.createElement('div');
    div.className = 'card' + (inDeck ? ' in-deck' : '');
    const typeLabel = c.champion ? 'champion' : c.type;
    const tagClass = c.champion ? 'tag-champion' : 'tag-' + c.type;
    const tagText = c.champion ? 'チャンピオン' : c.type === 'troop' ? 'トループ' : c.type === 'spell' ? 'スペル' : '建物';
    div.innerHTML = `
      <div class="card-top">
        <div class="card-name">${c.name}</div>
        <div class="cost-pip pip-${Math.min(c.cost,9)}">${c.cost}</div>
      </div>
      <span class="type-tag ${tagClass}">${tagText}</span>
      <div class="card-role">${c.role}</div>`;
    div.onclick = () => toggleDeck(c);
    list.appendChild(div);
  });
}

function toggleDeck(card) {
  const idx = deck.findIndex(d => d.name === card.name);
  if (idx >= 0) {
    deck.splice(idx, 1);
  } else {
    if (deck.length >= 8) { showToast('⚠ デッキは8枚まで'); return; }
    const champions = deck.filter(d => d.champion).length;
    if (card.champion && champions >= 1) { showToast('⚠ チャンピオンは1枚まで'); return; }
    deck.push(card);
  }
  renderDeck();
  render();
}

const COST_COLORS = {1:'#4caf50',2:'#26c6a0',3:'#3a8ef0',4:'#e8a020',5:'#8b5cf6',6:'#e05050',7:'#c0781a',8:'#888',9:'#9090d0'};

function renderDeck() {
  const slots = document.getElementById('deckSlots');
  slots.innerHTML = '';
  const sorted = [...deck].sort((a,b) => b.cost - a.cost);
  for (let i = 0; i < 8; i++) {
    const div = document.createElement('div');
    if (i < sorted.length) {
      const c = sorted[i];
      div.className = 'slot filled';
      div.title = 'クリックで外す';
      const typeLabel = c.champion ? 'CHAMP' : c.type === 'troop' ? 'TROOP' : c.type === 'spell' ? 'SPELL' : 'BLDG';
      const color = COST_COLORS[c.cost] || '#888';
      div.innerHTML = `<span class="slot-num">${i+1}</span>
        <div class="cost-pip pip-${Math.min(c.cost,9)}" style="flex-shrink:0">${c.cost}</div>
        <span class="slot-name">${c.name}</span>
        <span class="slot-type" style="color:${color};opacity:0.7">${typeLabel}</span>`;
      div.onclick = () => toggleDeck(c);
    } else {
      div.className = 'slot';
      div.innerHTML = `<span class="slot-num">${i+1}</span><span class="slot-empty-text">— 空き —</span>`;
    }
    slots.appendChild(div);
  }

  // count
  document.getElementById('deckCount').textContent = deck.length + '/8';

  // avg
  if (deck.length > 0) {
    const avg = (deck.reduce((s,c)=>s+c.cost,0) / deck.length);
    document.getElementById('avgVal').textContent = avg.toFixed(2);
    document.getElementById('avgSub').textContent = deck.length < 8 ? '（' + deck.length + '枚）' : '';
  } else {
    document.getElementById('avgVal').textContent = '—';
    document.getElementById('avgSub').textContent = '';
  }

  // cost bar
  const bar = document.getElementById('costBar');
  bar.innerHTML = '';
  if (deck.length > 0) {
    const counts = {};
    deck.forEach(c => counts[c.cost] = (counts[c.cost]||0) + 1);
    Object.entries(counts).sort((a,b)=>+a[0]-+b[0]).forEach(([cost, cnt]) => {
      const seg = document.createElement('div');
      seg.className = 'bar-seg';
      seg.style.flex = cnt;
      seg.style.background = COST_COLORS[cost] || '#888';
      seg.title = cost + 'コスト × ' + cnt;
      bar.appendChild(seg);
    });
  }
}

function copyDeck() {
  if (deck.length === 0) { showToast('デッキが空です'); return; }
  const sorted = [...deck].sort((a,b) => b.cost - a.cost);
  const avg = (deck.reduce((s,c)=>s+c.cost,0) / deck.length).toFixed(2);
  const text = '【クラロワ デッキ】平均コスト ' + avg + '\n' +
    sorted.map((c,i) => (i+1) + '. ' + c.name + '（' + c.cost + 'コス）').join('\n');
  navigator.clipboard.writeText(text).then(() => showToast('📋 コピーしました！'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

init();
</script>
