  .deck-card-meta { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

  .mini-card .pip { position: absolute; top: 2px; left: 2px; font-size: 9px; font-weight: 700; background: rgba(0,0,0,0.55); color: #fff; border-radius: 4px; padding: 0 3px; line-height: 1.4; }

  .coming-soon .big { font-size: 40px; margin-bottom: 12px; }
  .note { font-size: 11px; color: var(--text-dim); text-align: center; margin: 4px 0 18px; line-height: 1.6; }

  .footer-signature .by-text { font-size: 11px; opacity: 0.6; margin-right: 4px; }
  .footer-signature .creator-name { font-size: 13px; font-weight: bold; color: #eaeaea; letter-spacing: 3px; text-shadow: 0 0 8px rgba(255,255,255,0.4); }

// 人気デッキを描画
(function renderDecks() {
  const wrap = document.getElementById('deckList');
  DECKS.forEach((d, idx) => {
    const avg = (d.cards.reduce((s,n)=> s + (CARD_INFO[n] ? CARD_INFO[n].c : 0), 0) / d.cards.length).toFixed(1);
    const mini = d.cards.map(n => {
      const info = CARD_INFO[n];
      const img = info ? info.i : '';
      const cost = info ? info.c : '';
      return '<div class="mini-card" title="'+n+'"><span class="pip">'+cost+'</span>'+(img?'<img src="'+img+'" alt="'+n+'" loading="lazy">':'')+'</div>';
    }).join('');
    const url = 'index.html?deck=' + encodeURIComponent(d.cards.join(','));
    const el = document.createElement('div');
    el.className = 'deck-card';
    el.innerHTML =
      '<div class="deck-card-head">'+
        '<span class="deck-rank">#'+(idx+1)+'</span>'+
        '<div><div class="deck-card-name">'+d.name+'</div>'+
        '<div class="deck-card-meta">'+d.sub+' ・ 平均コスト '+avg+'</div></div>'+
      '</div>'+
      '<div class="deck-cards-grid">'+mini+'</div>'+
      '<a class="load-btn" href="'+url+'">▶ このデッキを作成ツールで開く</a>';
    wrap.appendChild(el);
  });
})();

const track = document.getElementById('track');
const viewport = document.getElementById('viewport');
const tabs = document.querySelectorAll('.seg-tab');
let currentPage = 0;
const totalPages = 2;
function goToPage(n) {
  currentPage = Math.max(0, Math.min(totalPages - 1, n));
  track.style.transform = 'translateX(-' + (currentPage * 100) + '%)';
  tabs.forEach((t, i) => t.classList.toggle('active', i === currentPage));
}
tabs.forEach(t => t.onclick = () => goToPage(parseInt(t.dataset.page)));
let startX = 0, startY = 0, dragging = false;
viewport.addEventListener('touchstart', e => { startX = e.touches[0].clientX; startY = e.touches[0].clientY; dragging = true; }, {passive:true});
viewport.addEventListener('touchend', e => {
  if (!dragging) return; dragging = false;
  const dx = e.changedTouches[0].clientX - startX;
  const dy = e.changedTouches[0].clientY - startY;
  if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
    if (dx < 0) goToPage(currentPage + 1); else goToPage(currentPage - 1);
  }
}, {passive:true});
